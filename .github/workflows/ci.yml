name: CI

on:
  push:
    branches: [main, init-ds-app]
  pull_request:

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uvx ruff@0.14.2 check services scripts
      - name: Ruff format check
        run: uvx ruff@0.14.2 format --check services scripts

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Pytest
        run: uv run pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start stack
        run: docker compose up -d --build
      - name: Run smoke test
        run: python3 scripts/smoke_test.py
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down -v

  # Journey evals (Phase 5) will expand the smoke job with pydantic_evals.
