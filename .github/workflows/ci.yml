name: CI

on:
  push:
    branches: [main, init-ds-app]
  pull_request:

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uvx ruff@0.14.2 check services scripts
      - name: Ruff format check
        run: uvx ruff@0.14.2 format --check services scripts

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # The golden-pack gate (s24 M3). Deterministic and zero-LLM-cost, so it
      # blocks every merge: it validates the eval *specification* — unique case
      # keys, dispatchable grader specs, no real user ids or data dumps in git.
      # The SQL/golden-rot half self-skips without a database, so it stays green
      # here and does the full check locally where the stack is up.
      - name: Golden pack gate
        run: uv run pytest tests/test_eval_pack.py -q
      - name: Pytest (repo root)
        run: uv run pytest -q
      - name: Pytest (data-agent service)
        working-directory: services/data-agent
        # --extra llm: pandas/pydantic-ai/fastembed live in the llm extra and
        # the pages/skills/sandbox tests import them.
        run: uv run --extra llm pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start stack
        run: docker compose up -d --build
      # `up -d` returns once containers are started, not once uvicorn is
      # accepting connections — hitting the API immediately gets a connection
      # reset. Poll both services' /health before running the test.
      - name: Wait for services
        run: |
          for url in http://localhost:8000/health http://localhost:8100/health; do
            ready=""
            for i in $(seq 1 60); do
              if curl -fsS "$url" >/dev/null 2>&1; then echo "$url ready"; ready=1; break; fi
              sleep 3
            done
            if [ -z "$ready" ]; then
              echo "$url never became ready"
              docker compose ps
              exit 1
            fi
          done
      - name: Run smoke test
        run: python3 scripts/smoke_test.py
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down -v

  # Journey evals (Phase 5) will expand the smoke job with pydantic_evals.
