name: Deploy (AWS)

# The s12 push-button deploy: merge to main → build/push images → terraform
# apply → run the migrate task → deploy the frontend → smoke-test the live URL.
# Auth is GitHub OIDC into the data-qa-github-deploy IAM role (no stored keys —
# the role + provider were created by infra/terraform/bootstrap). ci.yml stays
# the PR gate; this only runs post-merge (or manually via workflow_dispatch).
on:
  push:
    branches: [main]
    paths-ignore:
      - ".lavish/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      skip_pipeline:
        description: "Skip the dlt+dbt pipeline job (marts stay as-is) — for code-only redeploys"
        type: boolean
        default: false

permissions:
  id-token: write # OIDC token for AWS
  contents: read

# Never run two deploys at once (terraform state lock would block anyway).
concurrency:
  group: deploy-aws
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-2
  AWS_ROLE: arn:aws:iam::089783391188:role/data-qa-github-deploy
  # Scripts default to the local data-qa SSO profile; empty = use OIDC creds.
  AWS_PROFILE: ""
  TF_VAR_aws_profile: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push service images (linux/amd64)
        run: ./scripts/aws_build_push.sh

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false # plain stdout so -raw outputs work in scripts

      # Pushing :latest (above) kicks off App Runner auto-deploys. UpdateService
      # is rejected while one is in progress, so an apply that changes service
      # config (e.g. instance sizing) raced them and failed with
      # InvalidStateException: OPERATION_IN_PROGRESS (2026-07-21) — settle first.
      - name: Wait for image auto-deploys to settle
        run: ./scripts/wait_apprunner.sh "image auto-deploys, before terraform apply"

      - name: Terraform apply (foundations)
        working-directory: infra/terraform/foundations
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

      - name: Run database migrations (ECS one-shot)
        run: ./scripts/run_job.sh migrate

      # The marts must be rebuilt whenever the dbt models change, and nothing
      # else does it: this workflow used to run only `migrate`, so prod marts
      # silently froze at whatever the last manual pipeline run produced. That
      # is exactly how prod went 12 days stale and `marts.property_yield` never
      # got built — the Explore tab then 500'd on every load (UndefinedTableError)
      # while dev, whose pipeline runs on every `make up`, was fine. Running it
      # on every deploy costs ~15 minutes; a deploy that ships current code
      # against stale marts costs an outage. workflow_dispatch can skip it for
      # code-only redeploys.
      - name: Run data pipeline (ECS one-shot, dlt + dbt)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_pipeline }}
        run: ./scripts/run_job.sh pipeline

      - name: Wait for App Runner deployments
        # Any apply-triggered service updates must finish so the smoke test
        # hits the new code/config, not the old instances.
        run: ./scripts/wait_apprunner.sh "apply-triggered updates, before smoke test"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build & deploy frontend (S3 + CloudFront)
        run: |
          VITE_API_URL=$(terraform -chdir=infra/terraform/foundations output -raw backend_api_url)
          export VITE_API_URL
          ./scripts/deploy_frontend.sh

      - name: Cloud smoke test (live URL)
        run: ./scripts/cloud_smoke.sh
