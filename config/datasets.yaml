# Dataset registry — the pipeline ingests these and the agent answers over them.
# The two NSW datasets are kept unique. Raw, staging, and marts use matching
# relation names (`property_sales`, `property_rent`) so lineage is visible.
# The seed's source of truth is the Alembic migration (0002_property_market);
# this file documents the intended registry + access.
datasets:
  - slug: nsw_sales
    name: NSW property sales
    source: data/nswgov_df.csv            # full data (local only); sample in data/samples/
    description: >
      NSW Government residential sale prices. Powers raw.property_sales,
      staging.property_sales, and marts.property_sales.
    access:
      roles: [admin]      # admins see every dataset
      users: [user1]      # user1 granted; user2 excluded (demonstrates RLS)

  - slug: nsw_rent
    name: NSW rental bonds
    source: data/rentboard_df.csv
    description: >
      NSW Rental Bond Board lodgements. Powers raw.property_rent,
      staging.property_rent, and marts.property_rent.
    access:
      roles: [admin]
      users: [user1]      # user1 granted both datasets, so it can JOIN them

  - slug: nsw_yield
    name: NSW rental yield
    source: derived                       # sales JOIN rent; not its own CSV
    description: >
      Gross rental yield (rent vs sale price) by postcode, property type and
      month. Powers marts.property_yield (dbt-built from property_sales +
      property_rent). Its own dataset/grant (migration 0025) since answering
      it needs both nsw_sales and nsw_rent semantics.
    access:
      roles: [admin]
      users: [user1]      # same holder as nsw_sales/nsw_rent; user2 excluded
