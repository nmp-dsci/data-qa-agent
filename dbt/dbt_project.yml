name: 'data_qa_agent'
config-version: 2
version: '0.1'

profile: 'data_qa_agent'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
test-paths: ["tests"]

clean-targets:
  - "target"
  - "dbt_packages"

require-dbt-version: [">=1.8.0", "<2.0.0"]

# Layer -> schema + materialization routing (spec §3.1).
# A generate_schema_name override (macros/generate_schema_name.sql) makes these
# custom schema names LITERAL (no target-schema prefix), so the resulting
# Postgres schemas are exactly `fact_yfinance` and `analytics_yfinance`.
models:
  data_qa_agent:
    staging:
      +schema: fact_yfinance
      +materialized: view
    fact_yfinance:
      +schema: fact_yfinance
      +materialized: table
      +contract:
        enforced: true
    intermediate:
      +schema: fact_yfinance
      +materialized: view
    marts:
      +schema: analytics_yfinance
      +materialized: table

snapshots:
  data_qa_agent:
    +target_schema: fact_yfinance

seeds:
  data_qa_agent:
    +schema: analytics_yfinance
    sp500_constituents:
      +column_types:
        cik: text
