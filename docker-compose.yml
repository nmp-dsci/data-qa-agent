# Local Postgres 16 for the LOAD stage (§2.1).
# DB/user/password match the DATABASE_URL default in src/data_qa_agent/config.py:
#   postgresql://postgres:postgres@localhost:5432/data_qa
services:
  postgres:
    image: postgres:16
    container_name: data_qa_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: data_qa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d data_qa"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
