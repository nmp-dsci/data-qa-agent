- case_key: nsw_rent-how-has-average-weekly-rent-in-postcode-2145-mov-0864
  question: How has average weekly rent in postcode 2145 moved since 2020?
  dataset: nsw_rent
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: A monthly average-weekly-rent trend for postcode 2145 from 2020 to now.
  tags:
  - coverage-pack
  - coverage:R2
  - direction:trend
  grader: {}
  golden_sql: "SELECT\n  month,\n  property_type,\n  bedroom_band,\n  SUM(total_weekly_rent) AS total_weekly_rent,\n\
    \  SUM(n_rented) AS n_rented\nFROM marts.property_rent\nWHERE postcode = '2145'\n  AND month >= '2020-01-01'\n\
    GROUP BY month, property_type, bedroom_band\nORDER BY month, property_type, bedroom_band"
  golden_sandbox: "# PASS 1 — summary page\n# Compute avg_weekly_rent from additive sums\ndf['avg_weekly_rent']\
    \ = df['total_weekly_rent'] / df['n_rented']\n\n# Trend series — uses the 6-month rolling on avg_weekly_rent\n\
    s = skills.trend_series(df, month_col=\"month\", value_col=\"avg_weekly_rent\")\n\n# Latest value\
    \ (6-month smoothed)\nlatest = skills.latest_value(df, month_col=\"month\", value_col=\"avg_weekly_rent\"\
