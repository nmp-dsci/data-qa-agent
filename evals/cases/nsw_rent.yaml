  question: Give me rent trends for postcode 2077 vs 2076
  dataset: nsw_rent
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: ready
  tags:
  - from-chat
  - run:89b20fae-65ae-428d-9c85-84381193741f
  grader:
    key: _key
    kind: series
    value: avg_weekly_rent
    aggregate: ratio
    numerator: total_weekly_rent
    key_fields:
    - month
    - postcode
    denominator: n_rented
    tolerance_pct: 5.0
    expected_objects:
    - trend
  golden_sql: "SELECT\n  month,\n  postcode,\n  property_type,\n  SUM(total_weekly_rent) AS total_weekly_rent,\n\
    \  SUM(n_rented) AS n_rented\nFROM marts.property_rent\nWHERE postcode IN ('2077', '2076')\nGROUP\
    \ BY month, postcode, property_type\nORDER BY month, postcode, property_type"
  golden_sandbox: "# PASS 1 — Summary page: headline aggregates + trend chart\n\n# Check the data span\n\
    print(\"Month range:\", df['month'].min(), \"to\", df['month'].max())\nprint(\"Postcodes:\", df['postcode'].unique())\n\
    \n# Compute average weekly rent per month per postcode (re-aggregated)\ndf['avg_weekly_rent'] = df['total_weekly_rent']\
    \ / df['n_rented'].replace(0, float('nan'))\n\n# --- 2077 trend ---\ns2077 = skills.trend_series(\n\
    \    df[df['postcode'] == '2077'],\n    month_col='month',\n    value_col='total_weekly_rent',\n \
    \   den_col='n_rented'\n)\nlatest2077 = skills.latest_value(\n    df[df['postcode'] == '2077'],\n\
    \    month_col='month',\n    value_col='total_weekly_rent',\n    den_col='n_rented'\n)\n\n# --- 2076\
    \ trend ---\ns2076 = skills.trend_series(\n    df[df['postcode'] == '2076'],\n    month_col='month',\n\
    \    value_col='total_weekly_rent',\n    den_col='n_rented'\n)\nlatest2076 = skills.latest_value(\n\
    \    df[df['postcode'] == '2076'],\n    month_col='month',\n    value_col='total_weekly_rent',\n \
    \   den_col='n_rented'\n)\n\n# Growth rates (approx 3 years, will clamp to available span)\ng2077\
    \ = skills.growth_rate(\n    df[df['postcode'] == '2077'],\n    month_col='month',\n    value_col='total_weekly_rent',\n\
    \    den_col='n_rented',\n    years=3\n)\ng2076 = skills.growth_rate(\n    df[df['postcode'] == '2076'],\n\
    \    month_col='month',\n    value_col='total_weekly_rent',\n    den_col='n_rented',\n    years=3\n\
    )\n\n# Combine both series into one chart frame\ns2077['postcode'] = '2077'\ns2076['postcode'] = '2076'\n\
    combined = pd.concat([s2077, s2076], ignore_index=True)\n\n# Build a comparison chart showing both\
    \ postcode trends\nchart = skills.trend_chart(combined, title=\"Average Weekly Rent: Postcode 2077\
    \ vs 2076\")\n\n# Headlines\nheadlines = [\n    {\"label\": \"2077 — Avg Weekly Rent\", \"value\"\
    : f\"${latest2077['value']:.0f}\", \"basis\": latest2077['month']},\n    {\"label\": \"2077 — Change\
    \ (3yr)\", \"value\": f\"{g2077:.1f}%\" if g2077 is not None else \"N/A\", \"basis\": \"over ~3 years\"\
    },\n    {\"label\": \"2076 — Avg Weekly Rent\", \"value\": f\"${latest2076['value']:.0f}\", \"basis\"\
    : latest2076['month']},\n    {\"label\": \"2076 — Change (3yr)\", \"value\": f\"{g2076:.1f}%\" if\
    \ g2076 is not None else \"N/A\", \"basis\": \"over ~3 years\"},\n]\n\nresult = skills.build_report(\n\
    \    summary=\"**Postcode 2077 vs 2076 — Rent Trends**\\n\\nComparing average weekly rent trends across\
    \ all property types and bedroom bands. Both postcodes are in Sydney's upper North Shore (Hornsby/Waitara\
    \ area for 2077, Normanhurst/Thornleigh area for 2076). The chart shows the 6-month rolling average\
    \ weekly rent over the full data period.\",\n    headlines=headlines,\n    main_chart=chart,\n)"
