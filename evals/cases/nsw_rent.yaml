      - - data:
            sql: "WITH \n\n\nagg_rent AS (\n    SELECT postcode, month,\n           SUM(total_weekly_rent)\
              \ AS total_weekly_rent,\n           SUM(n_rented) AS n_rented\n    FROM marts.property_rent\n\
              \    GROUP BY postcode, month\n),\n\n\nsix_month_windows AS (\n    SELECT \n        postcode,\n\
              \        month,\n        total_weekly_rent,\n        n_rented,\n        AVG(total_weekly_rent)\
              \ OVER (\n            PARTITION BY postcode \n            ORDER BY month \n            ROWS\
              \ BETWEEN 5 PRECEDING AND CURRENT ROW\n        ) AS rolling_total_rent_6m,\n        AVG(n_rented)\
              \ OVER (\n            PARTITION BY postcode \n            ORDER BY month \n            ROWS\
              \ BETWEEN 5 PRECEDING AND CURRENT ROW\n        ) AS rolling_n_rented_6m\n    FROM agg_rent\n\
              ),\n\n\nrecent_window AS (\n    SELECT DISTINCT ON (postcode)\n        postcode,\n     \
              \   rolling_total_rent_6m AS recent_total_rent,\n        rolling_n_rented_6m AS recent_n_rented,\n\
              \        month AS recent_month\n    FROM six_month_windows\n    WHERE rolling_n_rented_6m\
              \ >= 10  \n\n    ORDER BY postcode, month DESC\n),\npast_window AS (\n    SELECT DISTINCT\
              \ ON (postcode)\n        postcode,\n        rolling_total_rent_6m AS past_total_rent,\n\
              \        rolling_n_rented_6m AS past_n_rented,\n        month AS past_month\n    FROM six_month_windows\n\
              \    WHERE rolling_n_rented_6m >= 10  \n\n      AND month >= '2020-01-01'  \n\n    ORDER\
              \ BY postcode, month ASC\n)\n\n\nSELECT \n    r.postcode,\n    r.recent_total_rent,\n  \
              \  r.recent_n_rented,\n    r.recent_month,\n    p.past_total_rent,\n    p.past_n_rented,\n\
              \    p.past_month,\n    \n\n    CASE WHEN r.recent_n_rented > 0 THEN r.recent_total_rent\
              \ / r.recent_n_rented ELSE NULL END AS recent_avg_rent,\n    CASE WHEN p.past_n_rented >\
              \ 0 THEN p.past_total_rent / p.past_n_rented ELSE NULL END AS past_avg_rent,\n    \n\n \
              \   CASE \n        WHEN p.past_total_rent > 0 AND p.past_n_rented > 0 AND r.recent_n_rented\
              \ > 0 \n        THEN ((r.recent_total_rent / r.recent_n_rented) / (p.past_total_rent / p.past_n_rented)\
              \ - 1) * 100 \n        ELSE NULL \n    END AS rent_growth_pct,\n    \n\n    pg.suburb AS\
              \ dominant_suburb,\n    pg.n_sales AS suburb_sales_count\nFROM recent_window r\nJOIN past_window\
              \ p ON r.postcode = p.postcode\n\n\nLEFT JOIN LATERAL (\n    SELECT suburb, n_sales\n  \
              \  FROM staging.int_postcode_geo\n    WHERE postcode = r.postcode\n    ORDER BY n_sales\
              \ DESC\n    LIMIT 1\n) pg ON true\nWHERE r.recent_n_rented >= 10\n  AND p.past_n_rented\
              \ >= 10\n  AND r.recent_total_rent > 0 AND p.past_total_rent > 0\nORDER BY r.recent_n_rented\
              \ DESC"
