    \n# Create quadrant labels\ndf['demand_quadrant'] = 'Below Avg'\ndf.loc[(df['recent_n_rented'] >=\
    \ volume_q3) & (df['rent_growth_pct'] >= growth_mean), 'demand_quadrant'] = 'High Demand (High Volume\
    \ + High Growth)'\ndf.loc[(df['recent_n_rented'] >= volume_q3) & (df['rent_growth_pct'] < growth_mean),\
    \ 'demand_quadrant'] = 'High Volume, Lower Growth'\ndf.loc[(df['recent_n_rented'] < volume_q3) & (df['rent_growth_pct']\
    \ >= growth_mean), 'demand_quadrant'] = 'High Growth, Lower Volume'\n\n# Top 20 strongest demand =\
    \ high volume + high growth, sorted by volume\ntop_20 = df[df['demand_quadrant'] == 'High Demand (High\
    \ Volume + High Growth)']\\\n    .sort_values('recent_n_rented', ascending=False).head(20).copy()\n\
    \ntop_20['display_label'] = top_20.apply(\n    lambda r: f\"{r['dominant_suburb']} ({r['postcode']})\"\
    \ if pd.notna(r['dominant_suburb']) else str(r['postcode']),\n    axis=1\n)\n\n# Headline stats\n\
    n_high_demand = len(df[df['demand_quadrant'] == 'High Demand (High Volume + High Growth)'])\ntop_postcode\
    \ = top_20.iloc[0]\ntop_suburb = top_postcode['dominant_suburb'] if pd.notna(top_postcode['dominant_suburb'])\
    \ else top_postcode['postcode']\n\n# Main chart - dual axis: volume (bars) + growth (line) for top\
    \ 20\ndual_chart_data = top_20[['display_label', 'recent_n_rented', 'rent_growth_pct']].copy()\ndual_chart_data.columns\
    \ = ['display_label', 'volume', 'growth']\n\n# For the chart\ns = skills.trend_series(None, month_col='month',\
    \ value_col='value')\n\nheadlines = [\n    {\"label\": \"Top Demand Postcode\", \"value\": top_suburb,\
    \ \"basis\": f\"Postcode {top_postcode['postcode']}\"},\n    {\"label\": \"Avg Weekly Rent (Top)\"\
    , \"value\": f\"${top_postcode['recent_avg_rent']:.0f}\", \"basis\": \"Recent 6-month average\"},\n\
    \    {\"label\": \"Rent Growth (Top)\", \"value\": f\"{top_postcode['rent_growth_pct']:.1f}%\", \"\
    basis\": \"5-year growth\"},\n    {\"label\": \"High-Demand Zones\", \"value\": str(n_high_demand),\
    \ \"basis\": f\"Postcodes with ≥{volume_q3:.0f} bonds & ≥{growth_mean:.1f}% growth\"}\n]\n\n# Build\
    \ the chart\nmain_chart = skills.comparison_chart(\n    dual_chart_data, \n    category_col='display_label',\
    \ \n    value_col='volume', \n    title='Top 20 Postcodes by Rental Demand — Bond Volume & 5-Year\
    \ Rent Growth'\n)\n\nresult = skills.build_report(\n    summary=f\"**Strongest rental demand** is\
