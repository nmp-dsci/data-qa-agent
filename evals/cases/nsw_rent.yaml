- case_key: nsw_rent-do-houses-or-units-rent-for-more-in-marsden-park-9673
  question: Do houses or units rent for more in Marsden Park (2765) — and is the gap widening?
  dataset: nsw_rent
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: Two average-weekly-rent series (house vs unit) for postcode 2765 plus whether the gap between
    them is widening.
  tags:
  - coverage-pack
  - coverage:R4
  - direction:comparison
  grader: {}
  golden_sql: "SELECT postcode, property_type, month, SUM(total_weekly_rent) AS total_weekly_rent, SUM(n_rented)\
    \ AS n_rented\nFROM marts.property_rent\nWHERE postcode = '2765'\n  AND property_type IN ('house',\
    \ 'unit')\nGROUP BY postcode, property_type, month\nORDER BY month, property_type"
  golden_sandbox: "# PASS 1 — Summary page: house vs unit average rent comparison and gap trend\n\n# Compute\
    \ average weekly rent for each month/property_type\ndf['avg_weekly_rent'] = df['total_weekly_rent']\
    \ / df['n_rented']\n\n# --- Latest values ---\n# Latest house value\nhouse_df = df[df['property_type']\
    \ == 'house'].copy()\nunit_df = df[df['property_type'] == 'unit'].copy()\n\nlatest_house = skills.latest_value(house_df,\
    \ month_col='month', value_col='avg_weekly_rent')\nlatest_unit = skills.latest_value(unit_df, month_col='month',\
    \ value_col='avg_weekly_rent')\n\n# --- Trend series for dual-axis chart ---\n# Get rolling series\
    \ for both property types\ns_house = skills.trend_series(house_df, month_col='month', value_col='avg_weekly_rent')\n\
    s_unit = skills.trend_series(unit_df, month_col='month', value_col='avg_weekly_rent')\n\n# Combine\
    \ into one frame for dual-axis (or comparison chart)\ns_house['property_type'] = 'House'\ns_unit['property_type']\
    \ = 'Unit'\ncombined = pd.concat([s_house, s_unit])\n\n# Also compute the gap (house avg - unit avg)\
    \ over time\nhouse_series = house_df[['month', 'avg_weekly_rent']].copy()\nhouse_series.columns =\
    \ ['month', 'house_rent']\nunit_series = unit_df[['month', 'avg_weekly_rent']].copy()\nunit_series.columns\
    \ = ['month', 'unit_rent']\nmerged = pd.merge(house_series, unit_series, on='month', how='inner')\n\
    merged['gap'] = merged['house_rent'] - merged['unit_rent']\n\n# Rolling gap\nmerged['month_dt'] =\
    \ pd.to_datetime(merged['month'])\nmerged = merged.sort_values('month_dt')\nmerged['gap_rolling']\
    \ = merged['gap'].rolling(6, min_periods=3).mean()\n\n# Latest gap\nlatest_gap = merged['gap_rolling'].iloc[-1]\
    \ if not merged['gap_rolling'].isna().all() else None\nlatest_gap_month = merged['month'].iloc[-1]\n\
    \n# Growth in gap over past 3 years\nrecent = merged.tail(36)\nif len(recent) >= 12:\n    early_gap\
    \ = recent['gap_rolling'].iloc[:6].mean()\n    late_gap = recent['gap_rolling'].iloc[-6:].mean()\n\
    \    if early_gap > 0:\n        gap_growth_pct = (late_gap - early_gap) / early_gap * 100\n    else:\n\
    \        gap_growth_pct = None\nelse:\n    gap_growth_pct = None\n\n# --- Growth rates ---\nhouse_growth\
    \ = skills.growth_rate(house_df, month_col='month', value_col='avg_weekly_rent', years=3)\nunit_growth\
    \ = skills.growth_rate(unit_df, month_col='month', value_col='avg_weekly_rent', years=3)\n\n# ---\
    \ Headlines ---\nheadlines = [\n    {\"label\": \"House weekly rent\", \"value\": f\"${latest_house['value']:.0f}\"\
    , \"basis\": latest_house['month']},\n    {\"label\": \"Unit weekly rent\", \"value\": f\"${latest_unit['value']:.0f}\"\
    , \"basis\": latest_unit['month']},\n    {\"label\": \"Rent gap (House − Unit)\", \"value\": f\"${latest_gap:.0f}\"\
    \ if latest_gap else \"N/A\", \"basis\": latest_gap_month},\n]\n\nif house_growth is not None:\n \
    \   headlines.append({\"label\": \"House rent growth (3yr)\", \"value\": f\"{house_growth:.1f}%\"\
    , \"basis\": \"annualised\"})\nif unit_growth is not None:\n    headlines.append({\"label\": \"Unit\
    \ rent growth (3yr)\", \"value\": f\"{unit_growth:.1f}%\", \"basis\": \"annualised\"})\nif gap_growth_pct\
    \ is not None:\n    headlines.append({\"label\": \"Gap change (3yr)\", \"value\": f\"{gap_growth_pct:.1f}%\"\
    , \"basis\": \"widening\" if gap_growth_pct > 0 else \"narrowing\"})\n\n# --- Main chart: dual-axis\
    \ showing both rent levels + the gap ---\ngap_chart_data = merged[['month', 'house_rent', 'unit_rent',\
    \ 'gap']].copy()\ngap_chart_data.columns = ['month', 'House', 'Unit', 'gap']\n\n# Better chart: trend\
    \ comparison with both lines\nmain_chart = skills.comparison_chart(\n    combined[combined['series']\
    \ == 'rolling'],\n    category_col='month',\n    value_col='value',\n    series_col='property_type',\n\
    \    title='House vs Unit Weekly Rent — Marsden Park (2765)'\n)\n\nsummary = (\n    f\"**Houses rent\
    \ for significantly more than units in Marsden Park (postcode 2765).** \"\n    f\"Latest (6-month\
    \ smoothed) weekly rent is **${latest_house['value']:.0f}** for houses vs \"\n    f\"**${latest_unit['value']:.0f}**\
    \ for units — a gap of approximately **${latest_gap:.0f}/week**. \"\n)\nif gap_growth_pct is not None:\n\
    \    if gap_growth_pct > 0:\n        summary += (\n            f\"Over the last 3 years that gap has\
    \ **widened by {gap_growth_pct:.1f}%**, \"\n            f\"as house rents have grown faster ({house_growth:.1f}%\
    \ over 3 years) than unit rents \"\n            f\"({unit_growth:.1f}% over 3 years).\"\n        )\n\
    \    else:\n        summary += (\n            f\"Over the last 3 years that gap has **narrowed by\
    \ {abs(gap_growth_pct):.1f}%**, \"\n            f\"as unit rents have grown faster ({unit_growth:.1f}%\
    \ over 3 years) than house rents \"\n            f\"({house_growth:.1f}% over 3 years).\"\n      \
    \  )\nelse:\n    summary += \"The trend in the gap over the last 3 years is unclear from available\
    \ data.\"\n\nresult = skills.build_report(\n    summary=summary,\n    headlines=headlines,\n    main_chart=main_chart,\n\
    )"
