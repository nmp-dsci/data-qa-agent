  - direction:segmentation
  grader: {}
  golden_sql: "WITH geo AS (SELECT DISTINCT ON (postcode) postcode, suburb FROM staging.int_postcode_geo\
    \ ORDER BY postcode, n_sales DESC),\nr_bounds AS (\n    SELECT postcode, min(month) AS first_month,\
    \ max(month) AS last_month\n    FROM marts.property_rent  GROUP BY postcode\n),\nr_first AS (\n  \
    \  SELECT b.postcode, sum(m.total_weekly_rent) / NULLIF(sum(m.n_rented), 0) AS avg_value\n    FROM\
    \ r_bounds b JOIN marts.property_rent m ON m.postcode = b.postcode AND m.month = b.first_month\n \
    \       \n    GROUP BY b.postcode\n),\nr_last AS (\n    SELECT b.postcode, sum(m.total_weekly_rent)\
    \ / NULLIF(sum(m.n_rented), 0) AS avg_value\n    FROM r_bounds b JOIN marts.property_rent m ON m.postcode\
    \ = b.postcode AND m.month = b.last_month\n        \n    GROUP BY b.postcode\n),\nr_growth AS (\n\
    \    SELECT l.postcode, l.avg_value,\n        round((l.avg_value - f.avg_value) / NULLIF(f.avg_value,\
    \ 0) * 100, 1) AS growth_pct\n    FROM r_last l JOIN r_first f ON f.postcode = l.postcode\n)\nSELECT\
    \ g.suburb, r.postcode, r.growth_pct AS rent_growth_pct, round(r.avg_value) AS last_avg_rent FROM\
    \ r_growth r JOIN geo g ON g.postcode = r.postcode ORDER BY rent_growth_pct DESC LIMIT 10"
