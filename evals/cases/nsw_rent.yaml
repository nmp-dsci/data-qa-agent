  golden_sql: "SELECT month, \n       SUM(total_weekly_rent) / NULLIF(SUM(n_rented), 0) AS avg_weekly_rent,\n\
    \       SUM(n_rented) AS n_rented\nFROM marts.property_rent\nWHERE postcode = '2000'\n  AND month\
    \ >= '2010-01-01'\n  AND month < '2016-01-01'\nGROUP BY month\nORDER BY month"
