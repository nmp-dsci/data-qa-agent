- case_key: nsw_sales-which-suburbs-had-the-strongest-house-price-grow-4d9b
  question: Which suburbs had the strongest house-price growth over the last three years?
  dataset: nsw_sales
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: A ranked list of suburbs by first-vs-last median-price growth over the last 3 years, with
    an n_sold volume floor so thin suburbs don't dominate.
  tags:
  - coverage-pack
  - coverage:S3
  - direction:ranking
  grader: {}
  golden_sql: "WITH recent AS (\n    SELECT suburb,\n           SUM(total_sale_value) / NULLIF(SUM(n_sold),\
    \ 0) AS avg_price_recent\n    FROM marts.property_sales\n    WHERE property_type = 'house'\n     \
    \ AND month >= '2026-01-01' AND month <= '2026-06-01'\n    GROUP BY suburb\n    HAVING SUM(n_sold)\
    \ >= 10\n),\npast AS (\n    SELECT suburb,\n           SUM(total_sale_value) / NULLIF(SUM(n_sold),\
    \ 0) AS avg_price_past\n    FROM marts.property_sales\n    WHERE property_type = 'house'\n      AND\
    \ month >= '2023-01-01' AND month <= '2023-06-01'\n    GROUP BY suburb\n    HAVING SUM(n_sold) >=\
    \ 10\n)\nSELECT r.suburb,\n       r.avg_price_recent,\n       p.avg_price_past,\n       CASE \n  \
    \         WHEN p.avg_price_past > 0 \n           THEN (r.avg_price_recent - p.avg_price_past) / p.avg_price_past\
    \ * 100 \n           ELSE NULL \n       END AS growth_pct\nFROM recent r\nJOIN past p ON r.suburb\
    \ = p.suburb\nWHERE r.avg_price_recent > 0 AND p.avg_price_past > 0\nORDER BY growth_pct DESC"
  golden_sandbox: "# PASS 1 — Summary page: top growth suburbs for house prices\n\n# Get top 20 suburbs\
    \ for the report\ntop20 = df.nlargest(20, 'growth_pct').reset_index(drop=True)\n\n# Headlines\ntop1\
    \ = top20.iloc[0]\nbottom1 = df.nsmallest(1, 'growth_pct').iloc[0]\n\nheadlines = [\n    {\"label\"\
    : \"Top growth suburb\", \"value\": top1['suburb'], \"basis\": f\"{top1['growth_pct']:.1f}% over 3\
    \ years\"},\n    {\"label\": \"Average price (recent)\", \"value\": f\"${top1['avg_price_recent']:,.0f}\"\
    , \"basis\": top1['suburb']},\n    {\"label\": \"Strongest growth\", \"value\": f\"{top1['growth_pct']:.1f}%\"\
    , \"basis\": f\"3-year growth (vs {bottom1['growth_pct']:.1f}% weakest)\"},\n    {\"label\": \"Suburbs\
    \ tracked\", \"value\": len(df), \"basis\": \"with ≥10 sales in both windows\"},\n]\n\n# Comparison\
    \ chart: top 15\nchart_data = top20.head(15).copy()\nchart_data['label'] = chart_data['suburb']\n\
    s = skills.comparison_chart(chart_data, category_col='suburb', value_col='growth_pct', title=\"Top\
    \ 15 Suburbs by 3-Year House Price Growth\")\n\nsummary = (\n    f\"House price growth across NSW\
    \ suburbs over the 3 years to mid-2026. \"\n    f\"Growth is measured as the change in average sale\
    \ price (total_sale_value / n_sold) \"\n    f\"between a 6-month window in early 2023 and early 2026.\
    \ \"\n    f\"The top suburb is {top1['suburb']} with {top1['growth_pct']:.1f}% growth.\"\n)\n\nresult\
    \ = skills.build_report(\n    summary=summary,\n    headlines=headlines,\n    main_chart=s,\n)"
