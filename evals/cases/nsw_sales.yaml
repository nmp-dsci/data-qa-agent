    FROM marts.property_sales\nWHERE postcode = '2170'\n  AND suburb = 'Liverpool'\n  AND property_type\
    \ = 'unit'\n  AND month >= (SELECT MAX(month) - INTERVAL '5 years' FROM marts.property_sales WHERE\
    \ postcode = '2170' AND suburb = 'Liverpool' AND property_type = 'unit')\nGROUP BY month\nORDER BY\
    \ month"
