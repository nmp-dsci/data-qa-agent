- case_key: nsw_sales-i-have-950k-for-a-house-shortlist-five-suburbs-w-a3f0
  question: I have $950k for a house — shortlist five suburbs with momentum and liquidity, and say why.
  dataset: nsw_sales
  tier: T7
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: A five-suburb shortlist where median house price is around/under $950k, combined with recent
    price growth and n_sold depth, each pick justified with its numbers.
  tags:
  - coverage-pack
  - coverage:S8
  - direction:recommendation
  grader: {}
  golden_sql: "WITH suburb_agg AS (\n  SELECT\n    s.suburb,\n    s.postcode,\n    DATE_TRUNC('month',\
    \ s.month)::DATE AS month,\n    SUM(s.total_sale_value) AS total_sale_value,\n    SUM(s.n_sold) AS\
    \ n_sold\n  FROM marts.property_sales s\n  JOIN marts.dim_postcode_geo g ON s.postcode = g.postcode\n\
    \  WHERE s.property_type = 'house'\n    AND g.gcc_name = 'Greater Sydney'\n    AND s.month >= '2019-01-01'\n\
    \  GROUP BY s.suburb, s.postcode, DATE_TRUNC('month', s.month)::DATE\n),\nsuburb_stats AS (\n  SELECT\n\
    \    suburb,\n    postcode,\n    SUM(total_sale_value) / NULLIF(SUM(n_sold), 0) AS overall_avg_price,\n\
    \    SUM(n_sold) AS total_sales\n  FROM suburb_agg\n  GROUP BY suburb, postcode\n),\nrecent_window\
    \ AS (\n  SELECT\n    suburb,\n    postcode,\n    SUM(total_sale_value) / NULLIF(SUM(n_sold), 0) AS\
    \ recent_avg_price,\n    SUM(n_sold) AS recent_sales\n  FROM suburb_agg\n  WHERE month >= (SELECT\
    \ MAX(month) - INTERVAL '6 months' FROM suburb_agg)\n  GROUP BY suburb, postcode\n),\nolder_window\
    \ AS (\n  SELECT\n    suburb,\n    postcode,\n    SUM(total_sale_value) / NULLIF(SUM(n_sold), 0) AS\
    \ old_avg_price,\n    SUM(n_sold) AS old_sales\n  FROM suburb_agg\n  WHERE month >= (SELECT MAX(month)\
    \ - INTERVAL '5 years 6 months' FROM suburb_agg)\n    AND month < (SELECT MAX(month) - INTERVAL '5\
    \ years' FROM suburb_agg)\n  GROUP BY suburb, postcode\n)\nSELECT\n  r.suburb,\n  r.postcode,\n  ROUND(r.recent_avg_price)\
    \ AS recent_avg_price,\n  r.recent_sales,\n  ROUND(o.old_avg_price) AS old_avg_price,\n  o.old_sales,\n\
    \  ROUND((r.recent_avg_price - o.old_avg_price) / NULLIF(o.old_avg_price, 0) * 100, 1) AS growth_pct_5yr,\n\
    \  ROUND(r.recent_sales::numeric / 6, 1) AS sales_per_month\nFROM recent_window r\nJOIN older_window\
    \ o ON r.suburb = o.suburb AND r.postcode = o.postcode\nWHERE r.recent_avg_price BETWEEN 750000 AND\
    \ 1100000\n  AND r.recent_sales >= 10\n  AND o.old_sales >= 10\n  AND o.old_avg_price >= 100000\n\
    ORDER BY growth_pct_5yr DESC"
