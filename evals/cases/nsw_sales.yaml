  question: show house price growth for hornsby / normanhurst
  dataset: nsw_sales
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: ready
  grader:
    key: _key
    kind: series
    value: avg_sale_price
    aggregate: ratio
    numerator: total_sale_value
    key_fields:
    - month
    - suburb
    denominator: n_sold
    tolerance_pct: 5.0
    expected_objects:
    - trend
  golden_sql: "SELECT\n  month,\n  suburb,\n  area_band,\n  sum(n_sold) AS n_sold,\n  sum(total_sale_value)\
    \ AS total_sale_value,\n  round((sum(total_sale_value) / NULLIF(sum(n_sold), 0))::numeric) AS avg_sale_price\n\
    FROM marts.property_sales\nWHERE property_type = 'house' AND suburb IN ('Hornsby', 'Normanhurst')\n\
    GROUP BY month, suburb, area_band\nORDER BY month, suburb, area_band"
  golden_sandbox: "df['price'] = df['total_sale_value'] / df['n_sold']\n\n# PASS 1: Summary page\ns =\
    \ skills.trend_series(df, month_col=\"month\", value_col=\"price\", group_col=\"suburb\")\n\n# Latest\
    \ values\nlatest_hornsby = skills.latest_value(df[df[\"suburb\"]==\"Hornsby\"], month_col=\"month\"\
    , value_col=\"price\")\nlatest_normanhurst = skills.latest_value(df[df[\"suburb\"]==\"Normanhurst\"\
    ], month_col=\"month\", value_col=\"price\")\n\n# Growth over ~5 years\ngrowth_hornsby = skills.growth_rate(df[df[\"\
    suburb\"]==\"Hornsby\"], month_col=\"month\", value_col=\"price\", years=5)\ngrowth_normanhurst =\
    \ skills.growth_rate(df[df[\"suburb\"]==\"Normanhurst\"], month_col=\"month\", value_col=\"price\"\
    , years=5)\n\nsummary = (\n    f\"Hornsby houses averaged **${latest_hornsby['value']:,.0f}** \"\n\
    \    f\"(as at {latest_hornsby['month']}), while Normanhurst houses averaged \"\n    f\"**${latest_normanhurst['value']:,.0f}**\
    \ (as at {latest_normanhurst['month']}). \"\n)\n\nif growth_hornsby is not None and growth_normanhurst\
    \ is not None:\n    summary += (\n        f\"Over the last ~5 years, Hornsby house prices grew **{growth_hornsby:.1f}%**\
    \ \"\n        f\"and Normanhurst house prices grew **{growth_normanhurst:.1f}%**.\"\n    )\nelif growth_hornsby\
    \ is not None:\n    summary += f\"Over the last ~5 years, Hornsby house prices grew **{growth_hornsby:.1f}%**.\"\
    \nelif growth_normanhurst is not None:\n    summary += f\"Over the last ~5 years, Normanhurst house\
    \ prices grew **{growth_normanhurst:.1f}%**.\"\n\n\nresult = skills.build_report(\n    summary=summary,\n\
    \    headlines=[\n        {\"label\": \"Hornsby Avg House Price\", \"value\": f\"${latest_hornsby['value']:,.0f}\"\
    , \"basis\": latest_hornsby['month']},\n        {\"label\": \"Normanhurst Avg House Price\", \"value\"\
    : f\"${latest_normanhurst['value']:,.0f}\", \"basis\": latest_normanhurst['month']},\n        {\"\
    label\": \"Hornsby 5-Yr Growth\", \"value\": f\"{growth_hornsby:.1f}%\" if growth_hornsby is not None\
    \ else \"N/A\", \"basis\": \"~5 years\"},\n        {\"label\": \"Normanhurst 5-Yr Growth\", \"value\"\
    : f\"{growth_normanhurst:.1f}%\" if growth_normanhurst is not None else \"N/A\", \"basis\": \"~5 years\"\
    },\n    ],\n    main_chart=skills.trend_chart(s, title=\"Hornsby vs Normanhurst — House Price Trend\"\
    ),\n)"
  golden_objects:
  - code: "work = df.copy()\n_grain = [\"month\", \"suburb\", \"area_band\"]\n_agg = {c: (c, 'sum') for\
      \ c in ('n_sold', 'total_sale_value') if c in work.columns}\nbase = work.groupby(_grain, as_index=False).agg(**_agg)\
      \ if _agg else work\n_months = sorted(m for m in base['month'].dropna().unique())\n_win_default\
      \ = set(_months[-12:])\nbar_df = base[base['month'].isin(set(_months[-12:]))].groupby([\"area_band\"\
      , \"suburb\"], as_index=False)['n_sold'].sum()\nbar_df = bar_df.rename(columns={'n_sold': 'sales_volume'})\n\
      line_df = base[base['month'].isin(set(_months[-6:]))].groupby([\"area_band\", \"suburb\"], as_index=False).agg(_num=('total_sale_value',\
      \ 'sum'), _den=('n_sold', 'sum'))\nline_df['avg_sale_price'] = (line_df['_num'] / line_df['_den'].where(line_df['_den']\
      \ != 0)).round()\nline_df = line_df[[\"area_band\", \"suburb\"] + ['avg_sale_price']]\nagg = bar_df.merge(line_df,\
      \ on=[\"area_band\", \"suburb\"], how='left')\nagg = agg.dropna(subset=['avg_sale_price'])\nchart\
      \ = skills.dual_axis_chart(\n    agg,\n    x_col=\"area_band\",\n    left_value_col=\"sales_volume\"\
      ,\n    right_value_col=\"avg_sale_price\",\n    x_type='nominal',\n    left_title=\"sales_volume\"\
      ,\n    right_title=\"avg_sale_price\", series_col=\"suburb\",\n    title=\"line-bar-sale-volume\"\
      ,\n)\nresult = skills.build_report(summary=\"Bars compare volume; the line tracks price across the\
      \ dimension.\", main_chart=chart)"
    name: line-bar-sale-volume
    spec:
      grain:
      - month
      - suburb
      - area_band
      group: suburb
      title: line-bar-sale-volume
      filter: property_type = 'house' AND suburb IN ('Hornsby', 'Normanhurst')
      months: 12
      dimension: area_band
      bar_measure:
        agg: sum
        label: sales_volume
        months: 12
        source: n_sold
      line_measure:
        den: n_sold
        num: total_sale_value
        label: avg_sale_price
        months: 6
    element_id: obj:line-bar-sale-volume
    object_type: compare
