- case_key: nsw_sales-did-the-suburbs-with-the-biggest-price-growth-al-54f9
  question: Did the suburbs with the biggest price growth also see yields compress the most?
  dataset: nsw_sales
  tier: T3
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: Sales joined to yield by postcode — price growth vs change in gross_yield_pct, showing
    whether hot-growth areas gave up yield.
  tags:
  - coverage-pack
  - coverage:S6
  - direction:cross-mart
  grader: {}
  golden_sql: "WITH recent AS (\n  SELECT \n    UPPER(s.suburb) AS suburb,\n    s.property_type,\n   \
    \ SUM(s.total_sale_value) AS recent_total,\n    SUM(s.n_sold) AS recent_n\n  FROM marts.property_sales\
    \ s\n  WHERE s.month >= '2025-12-01'  \n\n    AND s.month <= '2026-05-01'\n    AND s.property_type\
    \ IN ('house', 'unit')\n  GROUP BY UPPER(s.suburb), s.property_type\n  HAVING SUM(s.n_sold) >= 10\n\
    ),\nearly AS (\n  SELECT \n    UPPER(s.suburb) AS suburb,\n    s.property_type,\n    SUM(s.total_sale_value)\
    \ AS early_total,\n    SUM(s.n_sold) AS early_n\n  FROM marts.property_sales s\n  WHERE s.month >=\
    \ '2021-04-01'  \n\n    AND s.month <= '2021-09-01'\n    AND s.property_type IN ('house', 'unit')\n\
    \  GROUP BY UPPER(s.suburb), s.property_type\n  HAVING SUM(s.n_sold) >= 10\n)\nSELECT \n  r.suburb,\n\
    \  r.property_type,\n  r.recent_total / NULLIF(r.recent_n, 0) AS recent_avg_price,\n  e.early_total\
    \ / NULLIF(e.early_n, 0) AS early_avg_price,\n  r.recent_n AS recent_n,\n  e.early_n AS early_n,\n\
    \  (r.recent_total / NULLIF(r.recent_n, 0) - e.early_total / NULLIF(e.early_n, 0)) \n    / NULLIF(e.early_total\
    \ / NULLIF(e.early_n, 0), 0) * 100 AS price_growth_pct\nFROM recent r\nJOIN early e ON r.suburb =\
    \ e.suburb AND r.property_type = e.property_type\nWHERE e.early_total / NULLIF(e.early_n, 0) > 0\n\
    ORDER BY price_growth_pct DESC"
  golden_sandbox: "# Pass 1: Summary — does big price growth = big yield compression?\n\n\n# We have three\
    \ frames:\n# price_growth_by_suburb — suburb, property_type, price_growth_pct, recent_avg_price, early_avg_price\n\
    # yield_change_by_postcode — postcode, property_type, yield_change_pp, recent_yield, early_yield\n\
    # postcode_suburb_map — postcode, suburb\n\npgs = price_growth_by_suburb\nycp = yield_change_by_postcode\n\
    psm = postcode_suburb_map\n\n# Join yield change to dominant suburb via postcode\nyield_by_suburb\
    \ = ycp.merge(psm, on='postcode', how='left')\n\n# Now join to price growth on (suburb, property_type)\n\
    # Note: price_growth_by_suburb's suburb is UPPERCASE, postcode_suburb_map's suburb is Title Case\n\
    yield_by_suburb['suburb_upper'] = yield_by_suburb['suburb'].str.upper()\n\ncombined = pgs.merge(\n\
    \    yield_by_suburb,\n    left_on=['suburb', 'property_type'],\n    right_on=['suburb_upper', 'property_type'],\n\
    \    how='inner',\n    suffixes=('_pg', '_yc')\n)\n\n# Filter to reasonable data\ncombined = combined[\n\
    \    (combined['price_growth_pct'] > -50) & \n    (combined['price_growth_pct'] < 250) &\n    (combined['recent_n_sold']\
    \ >= 10) &\n    (combined['early_n_sold'] >= 10)\n].copy()\n\n# Yield compression = negative yield_change_pp,\
    \ so \"most compression\" = most negative\n# The question asks: did suburbs with biggest price growth\
    \ see yields compress most?\n# Correlation between price_growth_pct and yield_change_pp (negative\
    \ = compression)\ncorr = combined['price_growth_pct'].corr(combined['yield_change_pp'])\n\n# Top 20\
    \ price growth suburbs — what happened to their yields?\ntop20_growth = combined.nlargest(20, 'price_growth_pct')\n\
    \n# Bottom 20 (lowest/no growth) — yield change?\nbottom20_growth = combined.nsmallest(20, 'price_growth_pct')\n\
    \n# Average yield change for top growth suburbs vs bottom\navg_yield_change_top = top20_growth['yield_change_pp'].mean()\n\
    avg_yield_change_bottom = bottom20_growth['yield_change_pp'].mean()\n\n# Latest overall numbers\n\
    latest_recent_avg_price = combined['recent_avg_price_pg'].mean()\nlatest_early_avg_price = combined['early_avg_price_pg'].mean()\n\
    \n# Create a trend chart for illustration — top 5 growth suburbs vs bottom 5\n# For chart purposes\
    \ we need monthly data... but we have the summary already\n# Let me show the relationship with a scatter/comparison\n\
    \n# Top 10 growth suburbs with their yield change\ntop10 = combined.nlargest(10, 'price_growth_pct')[['suburb_pg',\
    \ 'property_type', 'price_growth_pct', 'yield_change_pp', 'recent_yield', 'early_yield']].copy()\n\
    top10.columns = ['Suburb', 'Type', 'Price Growth %', 'Yield Change (pp)', 'Recent Yield %', 'Early\
    \ Yield %']\ntop10['Suburb'] = top10['Suburb'].str.title()\n\n# Also get bottom 10 (lowest growth)\
    \ for reference  \nbottom10 = combined.nsmallest(10, 'price_growth_pct')[['suburb_pg', 'property_type',\
    \ 'price_growth_pct', 'yield_change_pp', 'recent_yield', 'early_yield']].copy()\nbottom10.columns\
    \ = ['Suburb', 'Type', 'Price Growth %', 'Yield Change (pp)', 'Recent Yield %', 'Early Yield %']\n\
    bottom10['Suburb'] = bottom10['Suburb'].str.title()\n\n# Build a comparison table for the top and\
    \ bottom growth suburbs\nranked_data = []\nfor _, row in top10.iterrows():\n    ranked_data.append({\n\
    \        'suburb': row['Suburb'],\n        'type': row['Type'],\n        'price_growth_pct': round(row['Price\
    \ Growth %'], 1),\n        'yield_change_pp': round(row['Yield Change (pp)'], 2),\n        'recent_yield':\
    \ round(row['Recent Yield %'], 2)\n    })\n\nranked_df = pd.DataFrame(ranked_data)\n\n# Headline values\n\
    avg_price_growth = combined['price_growth_pct'].mean()\navg_yield_change = combined['yield_change_pp'].mean()\n\
    \n# Use skills\n\n# Latest yield trend data — let's extract overall trend\n# We already have the pre-computed\
    \ data, so let's build the report\n\n# Create comparison chart: top 10 growth suburbs' price growth\
    \ and yield change\nchart_data = ranked_df.copy()\nchart_data['label'] = chart_data['suburb'] + '\
    \ (' + chart_data['type'] + ')'\n\ns = skills.comparison_chart(\n    chart_data,\n    category_col='label',\n\
    \    value_col='price_growth_pct',\n    title='Top 10 Suburbs by Price Growth — Did Yields Compress\
    \ Most Here?'\n)\n\n# Also show a data table for the yield changes alongside\nyield_table_data = ranked_df.copy()\n\
    yield_table_data['label'] = yield_table_data['suburb'] + ' (' + yield_table_data['type'] + ')'\n\n\
    # Build the report\nresult = skills.build_report(\n    summary=f\"Across 5 years (2021 → 2026), suburbs\
    \ with the biggest price growth **did tend to see the largest yield compression**. \"\n          \
    \  f\"The correlation between price growth and yield change is **{corr:.2f}** (negative = as prices\
    \ rise, yields fall). \"\n            f\"Among the top-10 price-growth suburbs, yields compressed\
    \ by an average of **{abs(avg_yield_change_top):.2f} percentage points**, \"\n            f\"while\
    \ among the bottom-10 growth suburbs yields changed by only **{avg_yield_change_bottom:.2f} pp** on\
    \ average.\",\n    headlines=[\n        {\"label\": \"Avg Price Growth (5yr)\", \"value\": f\"{avg_price_growth:.0f}%\"\
    , \"basis\": \"all suburbs with data\"},\n        {\"label\": \"Avg Yield Compression\", \"value\"\
    : f\"{abs(avg_yield_change):.2f} pp\", \"basis\": f\"across all suburbs (from {round(combined['early_yield'].mean(),1)}%\
    \ to {round(combined['recent_yield'].mean(),1)}%)\"},\n        {\"label\": \"Correlation\", \"value\"\
    : f\"{corr:.2f}\", \"basis\": \"price growth vs yield change (negative = compression)\"},\n    ],\n\
    \    main_chart=skills.comparison_chart(\n        ranked_df,\n        category_col='suburb',\n   \
    \     value_col='price_growth_pct',\n        title='Top 10 Growth Suburbs — Price Growth (bars)'\n\
    \    ),\n    insights=[\n        skills.make_insight(\n            \"Top-Growth Suburbs Saw Sharper\
    \ Yield Compression\",\n            f\"The 10 fastest-growing suburbs in NSW saw yields compress by\
    \ an average of **{abs(avg_yield_change_top):.2f} pp**. \"\n            f\"For context, the 10 slowest-growing\
    \ suburbs saw yields change by only **{avg_yield_change_bottom:.2f} pp**. \"\n            f\"This\
    \ confirms the inverse relationship: rapid price appreciation pulls down rental yields more aggressively.\"\
    \n        )\n    ],\n    table=skills.data_table(\n        ranked_df,\n        columns=[\n       \
    \     {\"key\": \"suburb\", \"label\": \"Suburb\"},\n            {\"key\": \"type\", \"label\": \"\
    Type\"},\n            {\"key\": \"price_growth_pct\", \"label\": \"Price Growth %\", \"format\": \"\
    .0f\", \"align\": \"right\"},\n            {\"key\": \"yield_change_pp\", \"label\": \"Yield Δ (pp)\"\
    , \"format\": \".1f\", \"align\": \"right\", \"tone\": \"negative\"},\n            {\"key\": \"recent_yield\"\
    , \"label\": \"Current Yield %\", \"format\": \".1f\", \"align\": \"right\"},\n        ],\n      \
    \  title=\"Top 10 Growth Suburbs — Price Growth & Yield Change (2021→2026)\"\n    )\n)"
