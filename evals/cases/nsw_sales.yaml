    s = skills.trend_series(df, month_col=\"month\", value_col=\"total_sale_value\", den_col=\"n_sold\"\
    )\n\n# Latest value\nlatest = skills.latest_value(df, month_col=\"month\", value_col=\"total_sale_value\"\
    , den_col=\"n_sold\")\n\n# Growth over ~5 years (the data goes from 2021-05 to ~2026-04/05, so ~5\
