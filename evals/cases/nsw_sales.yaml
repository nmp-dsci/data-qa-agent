              \ >= 10\n)\nSELECT \n  r.suburb,\n  r.property_type,\n  r.recent_total / NULLIF(r.recent_n,\
              \ 0) AS recent_avg_price,\n  e.early_total / NULLIF(e.early_n, 0) AS early_avg_price,\n\
