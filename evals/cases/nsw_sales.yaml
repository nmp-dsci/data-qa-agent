  golden_sql: "SELECT month, property_type, SUM(total_sale_value) AS total_sale_value, SUM(n_sold) AS\
    \ n_sold\nFROM marts.property_sales\nWHERE postcode = '2250'\n  AND property_type IN ('house', 'unit')\n\
    \  AND month >= '2015-01-01'\nGROUP BY month, property_type\nORDER BY month, property_type"
  golden_sandbox: "# Compute average price\ndf['avg_price'] = df['total_sale_value'] / df['n_sold']\n\n\
    # Separate house and unit series\nhouses = df[df['property_type'] == 'house'][['month', 'avg_price']].rename(columns={'avg_price':\
    \ 'house_price'})\nunits = df[df['property_type'] == 'unit'][['month', 'avg_price']].rename(columns={'avg_price':\
    \ 'unit_price'})\n\n# Merge to get house/unit side by side\nmerged = houses.merge(units, on='month',\
    \ how='inner').sort_values('month')\nmerged['price_gap'] = merged['house_price'] - merged['unit_price']\n\
    \n# --- Summary page: headline numbers ---\n# Latest price gap\nlatest = merged.iloc[-1]\nprice_gap_latest\
    \ = latest['price_gap']\nprice_gap_month = latest['month']\n\n# Growth in price gap since 2015\nearly\
    \ = merged.iloc[0]\nprice_gap_early = early['price_gap']\n\nyears_span = (pd.to_datetime(latest['month'])\
    \ - pd.to_datetime(early['month'])).days / 365.25\ngap_growth_pct = (price_gap_latest / price_gap_early\
    \ - 1) * 100\n\n# Latest house and unit prices\nlatest_house = latest['house_price']\nlatest_unit\
    \ = latest['unit_price']\n\n# Trend series for the chart: compute 6-month rolling averages\nmerged['house_6m_ra']\
    \ = merged['house_price'].rolling(window=6, min_periods=1).mean()\nmerged['unit_6m_ra'] = merged['unit_price'].rolling(window=6,\
    \ min_periods=1).mean()\nmerged['gap_6m_ra'] = merged['price_gap'].rolling(window=6, min_periods=1).mean()\n\
    \n# Build a trend series for both house and unit avg prices\n# For a dual_axis_chart we need house\
    \ price (bars) and unit price (line) or we can do a comparison chart\n# Better approach: use trend_chart\
    \ with two series — or dual_axis with gap as 2nd axis\n# Actually the best visual: house price (bars)\
    \ and unit price (line) with gap, or a trend showing all three\n\n# Let's build a long-form series\
    \ for the chart\nseries_rows = []\nfor _, row in merged.iterrows():\n    m = row['month']\n    series_rows.append({'month':\
    \ m, 'value': row['house_6m_ra'], 'series': 'House (6m avg)'})\n    series_rows.append({'month': m,\
    \ 'value': row['unit_6m_ra'], 'series': 'Unit (6m avg)'})\n    series_rows.append({'month': m, 'value':\
    \ row['gap_6m_ra'], 'series': 'Price gap (6m avg)'})\n\ntrend_df = pd.DataFrame(series_rows)\n\n#\
    \ Use trend series function for the main chart\nchart_data = skills.trend_series(df=trend_df, month_col='month',\
    \ value_col='value', group_col='series')\n\n# Headlines\nheadlines = [\n    {\"label\": \"House price\
    \ (6m avg)\", \"value\": f\"${latest_house:,.0f}\", \"basis\": price_gap_month},\n    {\"label\":\
    \ \"Unit price (6m avg)\", \"value\": f\"${latest_unit:,.0f}\", \"basis\": price_gap_month},\n   \
    \ {\"label\": \"House-unit price gap\", \"value\": f\"${price_gap_latest:,.0f}\", \"basis\": price_gap_month},\n\
    \    {\"label\": \"Price gap change since 2015\", \"value\": f\"{gap_growth_pct:+.0f}%\", \"basis\"\
    : f\"{years_span:.0f} years\"},\n]\n\n# Latest values using the skill\nlatest_house_val = skills.latest_value(df[df['property_type']=='house'],\
    \ month_col='month', value_col='avg_price')\nlatest_unit_val = skills.latest_value(df[df['property_type']=='unit'],\
    \ month_col='month', value_col='avg_price')\n\nresult = skills.build_report(\n    summary=\"**House\
    \ vs unit price gap in postcode 2250 (Central Coast / Gosford area)** since January 2015. The gap\
    \ (house avg price − unit avg price) has widened substantially as house prices have outpaced unit\
    \ price growth by a large margin.\",\n    headlines=headlines,\n    main_chart=skills.trend_chart(chart_data,\
    \ title=\"Central Coast (2250): House vs Unit Prices & Price Gap — 6-month rolling average\"),\n \
    \   insights=None,\n    profiles=None,\n)"
