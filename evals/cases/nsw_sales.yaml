- case_key: nsw_sales-do-bigger-blocks-appreciate-faster-compare-house-adb4
  question: Do bigger blocks appreciate faster? Compare house-price growth across land-size bands.
  dataset: nsw_sales
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: House-price growth compared across area_band buckets (<400 … 5000+) in ordinal order, not
    alphabetical.
  tags:
  - coverage-pack
  - coverage:S5
  - direction:segmentation
  grader: {}
  golden_sql: "SELECT\n  month,\n  area_band,\n  SUM(total_sale_value) AS total_sale_value,\n  SUM(n_sold)\
    \ AS n_sold\nFROM marts.property_sales\nWHERE property_type = 'house'\n  AND area_band != 'unknown'\n\
    GROUP BY month, area_band\nORDER BY month, area_band"
  golden_sandbox: "# PASS 1: Summary page - headline growth rates across land-size bands\n\n# Check date\
    \ range\nprint(\"Date range:\", df['month'].min(), \"to\", df['month'].max())\nprint(\"Area bands:\"\
    , df['area_band'].unique())\nprint(\"Rows:\", len(df))\n\n# Prepare: compute average price per band\
    \ per month\ndf['avg_price'] = df['total_sale_value'] / df['n_sold']\n\n# Get latest value per band\
    \ with 6-month rolling\nlatest_results = {}\nfor band in df['area_band'].unique():\n    band_df =\
    \ df[df['area_band'] == band].sort_values('month')\n    lv = skills.latest_value(band_df, month_col='month',\
    \ value_col='avg_price', den_col=None)\n    latest_results[band] = lv\n    print(f\"{band}: latest={lv['value']:.0f}\
    \ @ {lv['month']}\")\n\n# Compute growth over ~5 years (use 2019 vs 2024 since coverage goes back\
    \ to 2010)\n# Let's see what growth says with 5 years\ngrowth_results = {}\nfor band in df['area_band'].unique():\n\
    \    band_df = df[df['area_band'] == band].sort_values('month')\n    gr = skills.growth_rate(band_df,\
    \ month_col='month', value_col='avg_price', den_col=None, years=5)\n    growth_results[band] = gr\n\
    \    print(f\"{band}: 5yr growth = {gr:.1f}%\" if gr is not None else f\"{band}: 5yr growth = None\"\
    )\n\n# Also try 10 years for some bands\ngrowth_10_results = {}\nfor band in df['area_band'].unique():\n\
    \    band_df = df[df['area_band'] == band].sort_values('month')\n    gr = skills.growth_rate(band_df,\
    \ month_col='month', value_col='avg_price', den_col=None, years=10)\n    growth_10_results[band] =\
    \ gr\n    print(f\"{band}: 10yr growth = {gr:.1f}%\" if gr is not None else f\"{band}: 10yr growth\
    \ = None\")\n\n# Build trend series for each band\nall_trends = []\nfor band in df['area_band'].unique():\n\
    \    band_df = df[df['area_band'] == band].sort_values('month')\n    s = skills.trend_series(band_df,\
    \ month_col='month', value_col='avg_price', den_col=None, group_col=band, window=6)\n    all_trends.append(s)\n\
    \n# Combine all trends into one DataFrame for charting\ntrend_all = pd.concat(all_trends, ignore_index=True)\n\
    \n# Create headlines sorted by growth\nheadlines = []\nsorted_bands = sorted(growth_results.items(),\
    \ key=lambda x: x[1] if x[1] is not None else 0, reverse=True)\nfor band, gr in sorted_bands:\n  \
