              \ / NULLIF(SUM(ps.n_sold), 0) as recent_avg_price,\n    SUM(ps.n_sold) as recent_n\n  FROM\
              \ marts.property_sales ps\n  CROSS JOIN latest_6mo lm\n  WHERE ps.month >= DATE_TRUNC('month',\
              \ lm.max_m) - INTERVAL '5 months'\n    AND ps.month <= lm.max_m\n  GROUP BY ps.postcode,\
              \ ps.property_type\n),\nprior AS (\n  SELECT \n    ps.postcode,\n    ps.property_type,\n\
              \    SUM(ps.total_sale_value) / NULLIF(SUM(ps.n_sold), 0) as prior_avg_price,\n    SUM(ps.n_sold)\
              \ as prior_n\n  FROM marts.property_sales ps\n  CROSS JOIN latest_6mo lm\n  WHERE ps.month\
              \ >= DATE_TRUNC('month', lm.max_m) - INTERVAL '3 years 5 months'\n    AND ps.month <= DATE_TRUNC('month',\
              \ lm.max_m) - INTERVAL '3 years'\n  GROUP BY ps.postcode, ps.property_type\n)\nSELECT \n\
              \  r.postcode,\n  r.property_type,\n  r.recent_avg_price,\n  COALESCE(p.prior_avg_price,\
              \ 0) as prior_avg_price,\n  r.recent_n,\n  COALESCE(p.prior_n, 0) as prior_n,\n  CASE \n\
              \    WHEN COALESCE(p.prior_avg_price, 0) > 0 \n    THEN (r.recent_avg_price - p.prior_avg_price)\
              \ / p.prior_avg_price * 100.0\n    ELSE NULL \n  END as price_growth_3yr_pct\nFROM recent\
              \ r\nLEFT JOIN prior p ON r.postcode = p.postcode AND r.property_type = p.property_type\n\
              WHERE r.recent_n >= 10\n  AND (p.prior_n >= 5 OR p.prior_n IS NULL)"
