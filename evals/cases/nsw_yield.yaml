- case_key: nsw_yield-how-have-prices-rents-and-yield-in-campbelltown-b2d3
  question: How have prices, rents and yield in Campbelltown (2560) moved together since 2016?
  dataset: nsw_yield
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: Prices, rents and gross_yield_pct for postcode 2560 over time — a combo (bars + line) built
    on pre-aggregated rows.
  tags:
  - coverage-pack
  - coverage:Y2
  - direction:trend
  grader: {}
  golden_sql: "SELECT month, property_type, total_sale_value, n_sold, total_weekly_rent, n_rented, avg_sale_price,\
    \ avg_weekly_rent, gross_yield_pct\nFROM marts.property_yield\nWHERE postcode = '2560'\n  AND month\
    \ >= '2016-01-01'\n  AND property_type IN ('house', 'unit')\nORDER BY property_type, month"
  golden_sandbox: "# Build trend series for each metric and each property type\n# Average sale price\n\
    price_h = skills.trend_series(df[df.property_type=='house'], month_col=\"month\", value_col=\"avg_sale_price\"\
    , den_col=None)\nprice_u = skills.trend_series(df[df.property_type=='unit'], month_col=\"month\",\
    \ value_col=\"avg_sale_price\", den_col=None)\n\n# Average weekly rent\nrent_h = skills.trend_series(df[df.property_type=='house'],\
    \ month_col=\"month\", value_col=\"avg_weekly_rent\", den_col=None)\nrent_u = skills.trend_series(df[df.property_type=='unit'],\
    \ month_col=\"month\", value_col=\"avg_weekly_rent\", den_col=None)\n\n# Gross yield\nyield_h = skills.trend_series(df[df.property_type=='house'],\
    \ month_col=\"month\", value_col=\"gross_yield_pct\", den_col=None)\nyield_u = skills.trend_series(df[df.property_type=='unit'],\
    \ month_col=\"month\", value_col=\"gross_yield_pct\", den_col=None)\n\n# Latest values\nlatest_price_h\
    \ = skills.latest_value(df[df.property_type=='house'], month_col=\"month\", value_col=\"avg_sale_price\"\
    , den_col=None)\nlatest_price_u = skills.latest_value(df[df.property_type=='unit'], month_col=\"month\"\
    , value_col=\"avg_sale_price\", den_col=None)\nlatest_rent_h = skills.latest_value(df[df.property_type=='house'],\
    \ month_col=\"month\", value_col=\"avg_weekly_rent\", den_col=None)\nlatest_rent_u = skills.latest_value(df[df.property_type=='unit'],\
    \ month_col=\"month\", value_col=\"avg_weekly_rent\", den_col=None)\nlatest_yield_h = skills.latest_value(df[df.property_type=='house'],\
    \ month_col=\"month\", value_col=\"gross_yield_pct\", den_col=None)\nlatest_yield_u = skills.latest_value(df[df.property_type=='unit'],\
    \ month_col=\"month\", value_col=\"gross_yield_pct\", den_col=None)\n\n# Growth rates (over ~9 years\
    \ from 2016 to 2025)\ngrowth_price_h = skills.growth_rate(df[df.property_type=='house'], month_col=\"\
    month\", value_col=\"avg_sale_price\", years=9, den_col=None)\ngrowth_price_u = skills.growth_rate(df[df.property_type=='unit'],\
    \ month_col=\"month\", value_col=\"avg_sale_price\", years=9, den_col=None)\ngrowth_rent_h = skills.growth_rate(df[df.property_type=='house'],\
    \ month_col=\"month\", value_col=\"avg_weekly_rent\", years=9, den_col=None)\ngrowth_rent_u = skills.growth_rate(df[df.property_type=='unit'],\
    \ month_col=\"month\", value_col=\"avg_weekly_rent\", years=9, den_col=None)\ngrowth_yield_h = skills.growth_rate(df[df.property_type=='house'],\
    \ month_col=\"month\", value_col=\"gross_yield_pct\", years=9, den_col=None)\ngrowth_yield_u = skills.growth_rate(df[df.property_type=='unit'],\
    \ month_col=\"month\", value_col=\"gross_yield_pct\", years=9, den_col=None)\n\n# Build a dual-axis\
    \ chart: avg sale price (left) vs avg weekly rent (right) for both types\n# Prepare data for dual\
    \ axis - house\nhouse_df = df[df.property_type=='house'].copy()\nhouse_df['avg_sale_price_rolling']\
    \ = house_df['avg_sale_price'].rolling(6, min_periods=1).mean()\nhouse_df['avg_weekly_rent_rolling']\
    \ = house_df['avg_weekly_rent'].rolling(6, min_periods=1).mean()\n\nunit_df = df[df.property_type=='unit'].copy()\n\
    unit_df['avg_sale_price_rolling'] = unit_df['avg_sale_price'].rolling(6, min_periods=1).mean()\nunit_df['avg_weekly_rent_rolling']\
    \ = unit_df['avg_weekly_rent'].rolling(6, min_periods=1).mean()\n\n# For the main chart, use a dual-axis\
    \ chart showing prices + rents\n# We'll combine both types into a comparison chart\n\n# Price trend\
    \ chart - houses and units together\nprice_series = skills.trend_chart(\n    pd.concat([price_h.assign(type='House'),\
    \ price_u.assign(type='Unit')]),\n    title=\"Campbelltown 2560 — Average Sale Price (6-month rolling)\"\
    \n)\n\n# Rent trend chart\nrent_series = skills.trend_chart(\n    pd.concat([rent_h.assign(type='House'),\
    \ rent_u.assign(type='Unit')]),\n    title=\"Campbelltown 2560 — Average Weekly Rent (6-month rolling)\"\
    \n)\n\n# Yield trend chart\nyield_series = skills.trend_chart(\n    pd.concat([yield_h.assign(type='House'),\
    \ yield_u.assign(type='Unit')]),\n    title=\"Campbelltown 2560 — Gross Rental Yield (6-month rolling)\"\
    \n)\n\n# Format growth strings safely\ngph = f\"{growth_price_h:.1f}%\" if growth_price_h is not None\
    \ else \"N/A\"\ngpu = f\"{growth_price_u:.1f}%\" if growth_price_u is not None else \"N/A\"\ngrh =\
    \ f\"{growth_rent_h:.1f}%\" if growth_rent_h is not None else \"N/A\"\ngru = f\"{growth_rent_u:.1f}%\"\
    \ if growth_rent_u is not None else \"N/A\"\ngyh = f\"{growth_yield_h:.1f}%\" if growth_yield_h is\
    \ not None else \"N/A\"\ngyu = f\"{growth_yield_u:.1f}%\" if growth_yield_u is not None else \"N/A\"\
    \n\nresult = skills.build_report(\n    summary=\"Since 2016, Campbelltown (2560) has seen strong house\
    \ price growth and even stronger rent growth, compressing yields — especially for houses. Units followed\
    \ a similar trend but at lower price points and higher yields.\",\n    headlines=[\n        {\"label\"\
    : \"House Avg Price\", \"value\": f\"${latest_price_h['value']:,.0f}\", \"basis\": latest_price_h['month']},\n\
    \        {\"label\": \"House Price Growth\", \"value\": gph, \"basis\": \"~9 yr\"},\n        {\"label\"\
    : \"House Avg Rent\", \"value\": f\"${latest_rent_h['value']:,.0f}/wk\", \"basis\": latest_rent_h['month']},\n\
    \        {\"label\": \"House Rent Growth\", \"value\": grh, \"basis\": \"~9 yr\"},\n        {\"label\"\
    : \"House Gross Yield\", \"value\": f\"{latest_yield_h['value']:.1f}%\", \"basis\": latest_yield_h['month']},\n\
    \        {\"label\": \"Yield Change\", \"value\": gyh, \"basis\": \"~9 yr\"},\n        {\"label\"\
    : \"Unit Avg Price\", \"value\": f\"${latest_price_u['value']:,.0f}\", \"basis\": latest_price_u['month']},\n\
    \        {\"label\": \"Unit Price Growth\", \"value\": gpu, \"basis\": \"~9 yr\"},\n        {\"label\"\
    : \"Unit Avg Rent\", \"value\": f\"${latest_rent_u['value']:,.0f}/wk\", \"basis\": latest_rent_u['month']},\n\
    \        {\"label\": \"Unit Rent Growth\", \"value\": gru, \"basis\": \"~9 yr\"},\n        {\"label\"\
    : \"Unit Gross Yield\", \"value\": f\"{latest_yield_u['value']:.1f}%\", \"basis\": latest_yield_u['month']},\n\
    \        {\"label\": \"Yield Change\", \"value\": gyu, \"basis\": \"~9 yr\"},\n    ],\n    main_chart=skills.dual_axis_chart(\n\
    \        pd.concat([\n            house_df[['month','avg_sale_price_rolling','avg_weekly_rent_rolling']].assign(type='House').rename(columns={'avg_sale_price_rolling':'price','avg_weekly_rent_rolling':'rent'}),\n\
    \            unit_df[['month','avg_sale_price_rolling','avg_weekly_rent_rolling']].assign(type='Unit').rename(columns={'avg_sale_price_rolling':'price','avg_weekly_rent_rolling':'rent'})\n\
    \        ]),\n        x_col=\"month\",\n        left_value_col=\"price\",\n        right_value_col=\"\
    rent\",\n        left_title=\"Avg Sale Price ($)\",\n        right_title=\"Avg Weekly Rent ($/wk)\"\
    ,\n        title=\"Campbelltown 2560 — Prices (bars) vs Rents (line) — 6-month rolling\"\n    ),\n\
    \    insights=[\n        skills.make_insight(\n            \"House prices surged while yields compressed\"\
    ,\n            f\"Houses in Campbelltown rose from ~$571K in early 2016 to ${latest_price_h['value']:,.0f}\
    \ by {latest_price_h['month']} ({gph} growth), while weekly rent climbed {grh} — but rent didn't keep\
    \ pace with price growth, so gross yield fell from ~3.8% to {latest_yield_h['value']:.1f}% ({gyh}).\"\
    ,\n        ),\n        skills.make_insight(\n            \"Units: more affordable entry, higher yield\"\
    ,\n            f\"Units averaged ${latest_price_u['value']:,.0f} with {latest_yield_u['value']:.1f}%\
    \ gross yield — notably higher yield than houses ({latest_yield_h['value']:.1f}%), making units a\
    \ stronger rental-investment proposition. Unit prices grew {gpu} while rents rose {gru}.\",\n    \
    \    ),\n    ],\n)"
