- case_key: nsw_yield-where-can-i-get-yield-above-5-without-giving-up-3b89
  question: Where can I get yield above 5% without giving up capital growth? Cross current yields with
    three-year price growth.
  dataset: nsw_yield
  tier: T3
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: Postcodes with gross_yield_pct above 5% crossed against 3-year price growth from the sales
    mart — a yield-vs-growth screen.
  tags:
  - coverage-pack
  - coverage:Y6
  - direction:cross-mart
  grader: {}
  golden_sql: "WITH latest_6mo AS (\n  SELECT MAX(month) as max_m FROM marts.property_yield\n),\nrecent\
    \ AS (\n  SELECT \n    ps.postcode,\n    ps.property_type,\n    SUM(ps.total_sale_value) / NULLIF(SUM(ps.n_sold),\
    \ 0) as recent_avg_price,\n    SUM(ps.n_sold) as recent_n\n  FROM marts.property_sales ps\n  CROSS\
    \ JOIN latest_6mo lm\n  WHERE ps.month >= DATE_TRUNC('month', lm.max_m) - INTERVAL '5 months'\n  \
    \  AND ps.month <= lm.max_m\n  GROUP BY ps.postcode, ps.property_type\n),\nprior AS (\n  SELECT \n\
    \    ps.postcode,\n    ps.property_type,\n    SUM(ps.total_sale_value) / NULLIF(SUM(ps.n_sold), 0)\
    \ as prior_avg_price,\n    SUM(ps.n_sold) as prior_n\n  FROM marts.property_sales ps\n  CROSS JOIN\
    \ latest_6mo lm\n  WHERE ps.month >= DATE_TRUNC('month', lm.max_m) - INTERVAL '3 years 5 months'\n\
    \    AND ps.month <= DATE_TRUNC('month', lm.max_m) - INTERVAL '3 years'\n  GROUP BY ps.postcode, ps.property_type\n\
    )\nSELECT \n  r.postcode,\n  r.property_type,\n  r.recent_avg_price,\n  COALESCE(p.prior_avg_price,\
    \ 0) as prior_avg_price,\n  r.recent_n,\n  COALESCE(p.prior_n, 0) as prior_n,\n  CASE \n    WHEN COALESCE(p.prior_avg_price,\
    \ 0) > 0 \n    THEN (r.recent_avg_price - p.prior_avg_price) / p.prior_avg_price * 100.0\n    ELSE\
    \ NULL \n  END as price_growth_3yr_pct\nFROM recent r\nLEFT JOIN prior p ON r.postcode = p.postcode\
    \ AND r.property_type = p.property_type\nWHERE r.recent_n >= 10\n  AND (p.prior_n >= 5 OR p.prior_n\
    \ IS NULL)"
  golden_sandbox: "# Merge yield + price growth data\nyield_df = yield_current[['postcode', 'property_type',\
    \ 'gross_yield_pct', 'avg_sale_price', 'avg_weekly_rent', 'total_n_sold', 'total_n_rented']].copy()\n\
    growth_df = price_growth[['postcode', 'property_type', 'price_growth_3yr_pct', 'recent_avg_price',\
    \ 'prior_avg_price']].copy()\n\n# Join\nmerged = yield_df.merge(growth_df, on=['postcode', 'property_type'],\
    \ how='inner')\n\n# Filter: yield >= 5% AND positive price growth\nsweet_spot = merged[(merged['gross_yield_pct']\
    \ >= 5.0) & (merged['price_growth_3yr_pct'] > 0)].copy()\n\n# Sort by yield descending (want income\
    \ + growth combo)\nsweet_spot = sweet_spot.sort_values('gross_yield_pct', ascending=False)\n\n# Add\
    \ suburb name\nsuburb_dict = dict(zip(suburb_map['postcode'], suburb_map['suburb']))\nsweet_spot['suburb']\
    \ = sweet_spot['postcode'].map(suburb_dict)\nsweet_spot['location'] = sweet_spot['suburb'].fillna('')\
    \ + ' (' + sweet_spot['postcode'] + ')'\n\nprint(f\"Total postcode-type combos with yield>=5% & positive\
    \ 3yr growth: {len(sweet_spot)}\")\nprint(f\"Total postcode-type combos with yield>=5%: {len(merged[merged['gross_yield_pct']\
    \ >= 5.0])}\")\nprint(f\"Total combos overall: {len(merged)}\")\n\n# Top 20 by yield\ntop20 = sweet_spot.head(20).reset_index(drop=True)\n\
    print(\"\\n--- TOP 20 YIELD >= 5% WITH POSITIVE PRICE GROWTH ---\")\nfor i, row in top20.iterrows():\n\
    \    print(f\"{i+1}. {row['location']} | {row['property_type']} | Yield: {row['gross_yield_pct']:.1f}%\
    \ | 3yr Growth: {row['price_growth_3yr_pct']:.1f}% | Price: ${row['avg_sale_price']:,.0f}\")\n\n#\
    \ For the chart/comparison, create labelled rows\ntop20_chart = top20.copy()\ntop20_chart['label']\
    \ = top20_chart['location'] + ' - ' + top20_chart['property_type']\n\n# Summary stats\ncount_houses\
    \ = len(sweet_spot[sweet_spot['property_type'] == 'house'])\ncount_units = len(sweet_spot[sweet_spot['property_type']\
    \ == 'unit'])\navg_yield = sweet_spot['gross_yield_pct'].mean()\navg_growth = sweet_spot['price_growth_3yr_pct'].mean()\n\
    \nprint(f\"\\n--- SUMMARY ---\")\nprint(f\"House locations: {count_houses}, Unit locations: {count_units}\"\
    )\nprint(f\"Avg yield across sweet spots: {avg_yield:.2f}%\")\nprint(f\"Avg 3yr growth across sweet\
    \ spots: {avg_growth:.2f}%\")\n\n# Top houses vs top units\ntop_houses = sweet_spot[sweet_spot['property_type']\
    \ == 'house'].head(10)\ntop_units = sweet_spot[sweet_spot['property_type'] == 'unit'].head(10)\n\n\
    print(\"\\n--- TOP 10 HOUSES ---\")\nfor _, row in top_houses.iterrows():\n    print(f\"{row['location']}\
    \ | Yield: {row['gross_yield_pct']:.1f}% | Growth: {row['price_growth_3yr_pct']:.1f}%\")\n\nprint(\"\
    \\n--- TOP 10 UNITS ---\")\nfor _, row in top_units.iterrows():\n    print(f\"{row['location']} |\
    \ Yield: {row['gross_yield_pct']:.1f}% | Growth: {row['price_growth_3yr_pct']:.1f}%\")\n\n# Pass frames\
