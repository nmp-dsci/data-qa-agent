- case_key: nsw_yield-where-should-i-buy-next-under-800k-yield-at-leas-00d8
  question: Where should I buy next? Under $800k, yield at least 4.5%, rents still rising — shortlist
    Greater Sydney postcodes and justify each.
  dataset: nsw_yield
  tier: T7
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: 'The capstone: Greater Sydney postcodes with avg sale price under $800k AND gross_yield_pct
    at least 4.5% AND rising rents, each pick justified with its numbers.'
  tags:
  - coverage-pack
  - coverage:Y8
  - direction:recommendation
  grader: {}
  golden_sql: "WITH gs_postcodes AS (\n  SELECT postcode FROM marts.dim_postcode_geo WHERE gcc_name =\
    \ 'Greater Sydney'\n),\nrecent_window AS (\n  SELECT \n    py.postcode,\n    py.property_type,\n \
    \   SUM(py.total_sale_value) AS total_sale_value,\n    SUM(py.n_sold) AS n_sold,\n    SUM(py.total_weekly_rent)\
    \ AS total_weekly_rent,\n    SUM(py.n_rented) AS n_rented,\n    52.0 * SUM(py.total_weekly_rent) /\
    \ NULLIF(SUM(py.total_sale_value), 0) * 100 AS yield_pct,\n    MAX(py.month) AS latest_month\n  FROM\
    \ marts.property_yield py\n  JOIN gs_postcodes gs ON py.postcode = gs.postcode\n  WHERE py.month >=\
    \ (SELECT MAX(month) - INTERVAL '5 months' FROM marts.property_yield)\n  GROUP BY py.postcode, py.property_type\n\
    \  HAVING SUM(py.n_sold) >= 10 AND SUM(py.n_rented) >= 10\n    AND SUM(py.total_sale_value) / NULLIF(SUM(py.n_sold),\
    \ 0) < 800000\n    AND 52.0 * SUM(py.total_weekly_rent) / NULLIF(SUM(py.total_sale_value), 0) * 100\
    \ >= 4.5\n),\nearlier_window AS (\n  SELECT \n    py.postcode,\n    py.property_type,\n    SUM(py.total_weekly_rent)\
    \ AS total_weekly_rent_early,\n    SUM(py.n_rented) AS n_rented_early\n  FROM marts.property_yield\
    \ py\n  JOIN gs_postcodes gs ON py.postcode = gs.postcode\n  WHERE py.month BETWEEN \n    (SELECT\
    \ MAX(month) - INTERVAL '17 months' FROM marts.property_yield) \n    AND (SELECT MAX(month) - INTERVAL\
    \ '12 months' FROM marts.property_yield)\n  GROUP BY py.postcode, py.property_type\n),\ndominant_suburb\
    \ AS (\n  SELECT DISTINCT ON (postcode) postcode, suburb\n  FROM staging.int_postcode_geo\n  ORDER\
    \ BY postcode, n_sales DESC\n)\nSELECT \n  rw.postcode,\n  ds.suburb,\n  rw.property_type,\n  rw.yield_pct,\n\
    \  rw.total_sale_value / NULLIF(rw.n_sold, 0) AS avg_sale_price,\n  rw.total_weekly_rent / NULLIF(rw.n_rented,\
    \ 0) AS avg_weekly_rent,\n  rw.n_sold,\n  rw.n_rented,\n  rw.latest_month,\n  CASE \n    WHEN ew.total_weekly_rent_early\
    \ IS NOT NULL AND ew.n_rented_early > 0 AND rw.n_rented > 0\n    THEN ((rw.total_weekly_rent / rw.n_rented)\
    \ / (ew.total_weekly_rent_early / ew.n_rented_early) - 1) * 100\n    ELSE NULL \n  END AS rent_growth_pct\n\
    FROM recent_window rw\nLEFT JOIN earlier_window ew ON rw.postcode = ew.postcode AND rw.property_type\
    \ = ew.property_type\nJOIN dominant_suburb ds ON rw.postcode = ds.postcode\nORDER BY rw.yield_pct\
    \ DESC"
