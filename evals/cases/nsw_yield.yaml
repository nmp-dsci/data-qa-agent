- case_key: nsw_yield-top-10-postcodes-by-gross-yield-right-now-and-ho-5757
  question: Top 10 postcodes by gross yield right now — and how much data sits behind each number.
  dataset: nsw_yield
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: Top 10 postcodes by current gross_yield_pct with n_sold/n_rented shown as evidence of how
    thin each cell is.
  tags:
  - coverage-pack
  - coverage:Y3
  - direction:ranking
  grader: {}
  golden_sql: 'SELECT DISTINCT ON (postcode) postcode, suburb

    FROM staging.int_postcode_geo

    ORDER BY postcode, n_sales DESC'
  golden_sandbox: "df = yield_data\nsuburbs = suburb_map\nsuburbs = suburbs[suburbs['postcode'] != ''].copy()\n\
    \n# Compute gross yield\ndf['avg_sale_price'] = df['total_sale_value'] / df['n_sold']\ndf['avg_weekly_rent']\
    \ = df['total_weekly_rent'] / df['n_rented']\ndf['gross_yield_pct'] = 52 * df['avg_weekly_rent'] /\
    \ df['avg_sale_price'] * 100\n\n# Merge suburb info\ndf = df.merge(suburbs[['postcode', 'suburb']],\
    \ on='postcode', how='left')\n\n# Top 10 by yield\ntop10 = df.nlargest(10, 'gross_yield_pct').reset_index(drop=True)\n\
    top10['rank'] = range(1, 11)\n\n# Build the headline value\ntop_yield = top10.iloc[0]\nheadline_label\
    \ = f\"{top_yield['suburb']} ({top_yield['postcode']})\"\nheadline_value = f\"{top_yield['gross_yield_pct']:.1f}%\"\
    \nheadline_basis = f\"Latest 6 months ({top_yield['n_sold']:.0f} sales, {top_yield['n_rented']:.0f}\
    \ rentals)\"\n\n# Also compute the overall market median yield for context\noverall_median_yield =\
    \ df['gross_yield_pct'].median()\n\n# Table data for the ranked list\ntable_cols = [\n    {'key':\
    \ 'rank', 'label': 'Rank', 'align': 'right'},\n    {'key': 'suburb', 'label': 'Suburb'},\n    {'key':\
    \ 'postcode', 'label': 'Postcode'},\n    {'key': 'gross_yield_pct', 'label': 'Gross Yield', 'format':\
    \ '{:.1f}%', 'align': 'right'},\n    {'key': 'n_sold', 'label': 'Sales (6mo)', 'format': '{:,.0f}',\
    \ 'align': 'right'},\n    {'key': 'n_rented', 'label': 'Rentals (6mo)', 'format': '{:,.0f}', 'align':\
    \ 'right'},\n]\n\n# Comparison chart - ranked yields\nchart_df = top10.copy()\nchart_df['label'] =\
    \ chart_df['suburb'] + ' (' + chart_df['postcode'] + ')'\nchart = skills.comparison_chart(chart_df,\
    \ category_col='label', value_col='gross_yield_pct', title='Top 10 Postcodes by Gross Rental Yield\
    \ (6-month rolling)')\n\nresult = skills.build_report(\n    summary=f\"Right now (latest 6 months\
    \ to May 2026), the top postcode by gross rental yield is **{headline_label}** at **{headline_value}**,\
    \ based on {top_yield['n_sold']:.0f} sales and {top_yield['n_rented']:.0f} rental bonds. Across NSW\
    \ markets, the median postcode-level yield is {overall_median_yield:.1f}%.\",\n    headlines=[\n \
    \       {'label': f'#1: {headline_label}', 'value': headline_value, 'basis': headline_basis},\n  \
    \      {'label': 'Median Postcode Yield', 'value': f'{overall_median_yield:.1f}%', 'basis': 'Across\
    \ all postcodes with ≥10 sales & rentals'},\n    ],\n    main_chart=chart,\n    table=skills.data_table(top10,\
    \ columns=table_cols, title='Top 10 Postcodes — Gross Yield & Data Volume', variant='ranked', bar_key='gross_yield_pct'),\n\
    )"
