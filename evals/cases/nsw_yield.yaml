- case_key: nsw_yield-what-s-the-best-safe-high-yield-area-a331
  question: What's the best safe high-yield area?
  dataset: nsw_yield
  tier: T4
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: '''Safe'' is undefined (the data has no vacancy or volatility measure) — the agent should
    define safe (e.g. via data volume n_sold/n_rented) or ask, then answer.'
  tags:
  - coverage-pack
  - coverage:Y9
  - direction:ambiguous
  grader: {}
  golden_sql: "WITH\ndominant_suburb AS (\n    SELECT DISTINCT ON (postcode) postcode, suburb\n    FROM\
    \ staging.int_postcode_geo\n    ORDER BY postcode, n_sales DESC\n),\nrecent_yield AS (\n    SELECT\n\
    \        y.postcode,\n        y.property_type,\n        SUM(y.total_sale_value) AS total_sale_value,\n\
    \        SUM(y.n_sold) AS n_sold,\n        SUM(y.total_weekly_rent) AS total_weekly_rent,\n      \
    \  SUM(y.n_rented) AS n_rented\n    FROM marts.property_yield y\n    WHERE y.month >= (SELECT MAX(month)\
    \ - INTERVAL '6 months' FROM marts.property_yield)\n    GROUP BY y.postcode, y.property_type\n)\n\
    SELECT\n    ry.postcode,\n    ds.suburb,\n    ry.property_type,\n    ry.total_sale_value,\n    ry.n_sold,\n\
    \    ry.total_weekly_rent,\n    ry.n_rented,\n    (ry.total_sale_value / NULLIF(ry.n_sold, 0)) AS\
    \ avg_sale_price,\n    (ry.total_weekly_rent / NULLIF(ry.n_rented, 0)) AS avg_weekly_rent,\n    52.0\
    \ * (ry.total_weekly_rent / NULLIF(ry.n_rented, 0)) / NULLIF((ry.total_sale_value / NULLIF(ry.n_sold,\
    \ 0)), 0) * 100 AS gross_yield_pct,\n    COALESCE(dg.sa3_name, 'Unknown') AS sa3_name,\n    COALESCE(dg.sa4_name,\
    \ 'Unknown') AS sa4_name,\n    COALESCE(dg.gcc_name, 'Unknown') AS gcc_name\nFROM recent_yield ry\n\
    LEFT JOIN dominant_suburb ds ON ry.postcode = ds.postcode\nLEFT JOIN marts.dim_postcode_geo dg ON\
    \ ry.postcode = dg.postcode\nWHERE ry.n_sold >= 10 AND ry.n_rented >= 10\nORDER BY gross_yield_pct\
    \ DESC"
  golden_sandbox: "# PASS 1 — Summary page\n\n# --- Explore the data ---\nprint(f\"Total postcode-property_type\
    \ rows: {len(df)}\")\nprint(f\"Date range (from yield mart): N/A — we used latest 6 months\")\nprint(f\"\
    Columns: {list(df.columns)}\")\n\n# Overall yield stats\nprint(f\"\\nYield stats overall:\")\nprint(df.groupby('property_type')['gross_yield_pct'].describe())\n\
    \n# --- For \"safe\" let's define \"Greater Sydney\" (gcc_name = 'Greater Sydney') with high volume\
    \ ---\n# Filter to Greater Sydney with good transaction volumes\nsafe = df[(df['gcc_name'] == 'Greater\
    \ Sydney') & (df['n_sold'] >= 30) & (df['n_rented'] >= 30)].copy()\n\nprint(f\"\\nSafe areas (Greater\
    \ Sydney, n_sold>=30, n_rented>=30): {len(safe)} rows\")\n\n# Top safe areas overall\nsafe_agg = safe.groupby(['postcode','suburb','property_type'],\
    \ as_index=False).agg({\n    'gross_yield_pct': 'first',\n    'n_sold': 'first',\n    'n_rented':\
    \ 'first',\n    'avg_sale_price': 'first',\n    'avg_weekly_rent': 'first',\n    'sa3_name': 'first',\n\
    })\n\n# Top 10 for houses in Greater Sydney\ntop_houses = safe_agg[safe_agg['property_type'] == 'house'].nlargest(10,\
    \ 'gross_yield_pct')\nprint(f\"\\nTop safe high-yield houses in Greater Sydney:\")\nprint(top_houses[['suburb','postcode','gross_yield_pct','n_sold','n_rented','avg_sale_price','avg_weekly_rent','sa3_name']])\n\
    \n# Top 10 for units in Greater Sydney\ntop_units = safe_agg[safe_agg['property_type'] == 'unit'].nlargest(10,\
    \ 'gross_yield_pct')\nprint(f\"\\nTop safe high-yield units in Greater Sydney:\")\nprint(top_units[['suburb','postcode','gross_yield_pct','n_sold','n_rented','avg_sale_price','avg_weekly_rent','sa3_name']])\n\
    \n# --- Compute latest overall yield for Greater Sydney ---\n# Reaggregate at Greater Sydney level\
    \ by property_type\ngs = df[df['gcc_name'] == 'Greater Sydney'].copy()\ngs_agg = gs.groupby('property_type',\
    \ as_index=False).agg({\n    'total_sale_value': 'sum',\n    'n_sold': 'sum',\n    'total_weekly_rent':\
    \ 'sum',\n    'n_rented': 'sum'\n})\ngs_agg['avg_sale_price'] = gs_agg['total_sale_value'] / gs_agg['n_sold']\n\
    gs_agg['avg_weekly_rent'] = gs_agg['total_weekly_rent'] / gs_agg['n_rented']\ngs_agg['yield_pct']\
    \ = 52 * gs_agg['avg_weekly_rent'] / gs_agg['avg_sale_price'] * 100\nprint(f\"\\nGreater Sydney overall\
    \ yield by type:\")\nprint(gs_agg[['property_type','yield_pct','n_sold','n_rented']])\n\n# --- Build\
    \ the report ---\n# Headlines\nheadlines = []\nfor _, row in gs_agg.iterrows():\n    t = row['property_type']\n\
    \    y = round(row['yield_pct'], 2)\n    n = int(row['n_sold'] + row['n_rented'])\n    headlines.append({\n\
    \        \"label\": f\"Greater Sydney {t.title()} Yield\",\n        \"value\": f\"{y:.1f}%\",\n  \
    \      \"basis\": f\"6-month rolling | {n:,} total transactions\"\n    })\n\n# Top safe Sydney area\
    \ headline\nbest_house = top_houses.iloc[0]\nbest_unit = top_units.iloc[0] if len(top_units) > 0 else\
    \ None\n\nsafe_suburbs_text = f\"Top safe high-yield suburbs in Greater Sydney — filtered for depth\
    \ (≥30 sales & ≥30 rentals in latest 6 months).\"\n\n# Main chart: top houses in safe Greater Sydney\n\
    chart_df = top_houses[['suburb', 'gross_yield_pct', 'n_sold']].copy()\nchart_df.columns = ['suburb',\
    \ 'gross_yield_pct', 'n_sold']\nchart_df = chart_df.sort_values('gross_yield_pct', ascending=True)\n\
    \nmain_chart = skills.comparison_chart(\n    chart_df,\n    category_col='suburb',\n    value_col='gross_yield_pct',\n\
    \    title=\"Top 10 Safe High-Yield Suburbs — Houses (Greater Sydney)\"\n)\n\n# Also build a units\
    \ chart if we have units\nif best_unit is not None:\n    chart_df_u = top_units[['suburb', 'gross_yield_pct',\
    \ 'n_sold']].copy()\n    chart_df_u.columns = ['suburb', 'gross_yield_pct', 'n_sold']\n    chart_df_u\
    \ = chart_df_u.sort_values('gross_yield_pct', ascending=True)\n    \n    units_chart = skills.comparison_chart(\n\
    \        chart_df_u,\n        category_col='suburb',\n        value_col='gross_yield_pct',\n     \
    \   title=\"Top 10 Safe High-Yield Suburbs — Units (Greater Sydney)\"\n    )\nelse:\n    units_chart\
    \ = None\n\nsummary_text = f\"**Safe high-yield areas** in Greater Sydney, filtered for market depth:\
    \ at least 30 sales and 30 rental bonds in the latest 6 months. **Houses** average {gs_agg[gs_agg['property_type']=='house']['yield_pct'].values[0]:.1f}%\
    \ gross yield; **units** average {gs_agg[gs_agg['property_type']=='unit']['yield_pct'].values[0]:.1f}%.\
    \ Top house suburb: **{best_house['suburb']}** ({best_house['gross_yield_pct']:.1f}% yield, {int(best_house['n_sold'])}\
    \ sales, postcode {best_house['postcode']}).\"\n\nresult = skills.build_report(\n    summary=summary_text,\n\
    \    headlines=headlines,\n    main_chart=main_chart,\n    table=skills.data_table(\n        top_houses[['suburb','postcode','gross_yield_pct','n_sold','n_rented','avg_sale_price','avg_weekly_rent','sa3_name']].rename(columns={\n\
    \            'suburb': 'Suburb',\n            'postcode': 'Postcode',\n            'gross_yield_pct':\
    \ 'Gross Yield %',\n            'n_sold': 'Sales (6mo)',\n            'n_rented': 'Rentals (6mo)',\n\
    \            'avg_sale_price': 'Avg Sale Price',\n            'avg_weekly_rent': 'Avg Weekly Rent',\n\
