- case_key: nsw_yield-compare-gross-yields-across-sa4-regions-greater-4ebf
  question: Compare gross yields across SA4 regions — Greater Sydney vs Rest of NSW.
  dataset: nsw_yield
  tier: T6
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: Gross yield by sa4_name via dim_postcode_geo, recomputed from totals (52 × Σweekly_rent
    / Σsale_value), never averaged from gross_yield_pct; Greater Sydney vs Rest of NSW.
  tags:
  - coverage-pack
  - coverage:Y7
  - direction:geo-rollup
  grader: {}
  golden_sql: "SELECT\n  g.sa4_name,\n  g.gcc_name,\n  y.property_type,\n  y.month,\n  SUM(y.total_sale_value)\
    \ AS total_sale_value,\n  SUM(y.n_sold) AS n_sold,\n  SUM(y.total_weekly_rent) AS total_weekly_rent,\n\
    \  SUM(y.n_rented) AS n_rented\nFROM marts.property_yield y\nJOIN marts.dim_postcode_geo g ON y.postcode\
    \ = g.postcode\nWHERE g.sa4_name IS NOT NULL\n  AND g.gcc_name IN ('Greater Sydney', 'Rest of NSW')\n\
    GROUP BY g.sa4_name, g.gcc_name, y.property_type, y.month\nORDER BY y.month, g.gcc_name, g.sa4_name,\
    \ y.property_type"
  golden_sandbox: "# Compute yield at the GCC x property_type x month level, then compare Greater Sydney\
    \ vs Rest of NSW\n\n\n# --- Compute yield per row ---\n# yield = 52 * total_weekly_rent / n_rented\
    \ / (total_sale_value / n_sold) * 100\ndf['avg_weekly_rent'] = df['total_weekly_rent'] / df['n_rented']\n\
    df['avg_sale_price'] = df['total_sale_value'] / df['n_sold']\ndf['yield_pct'] = 52.0 * df['avg_weekly_rent']\
    \ / df['avg_sale_price'] * 100.0\n\n# --- For headline: aggregate all property types at GCC level\
    \ ---\ngcc_monthly = df.groupby(['gcc_name', 'month'], as_index=False).apply(\n    lambda g: pd.Series({\n\
    \        'total_sale_value': g['total_sale_value'].sum(),\n        'n_sold': g['n_sold'].sum(),\n\
    \        'total_weekly_rent': g['total_weekly_rent'].sum(),\n        'n_rented': g['n_rented'].sum()\n\
    \    })).reset_index()\ngcc_monthly['avg_weekly_rent'] = gcc_monthly['total_weekly_rent'] / gcc_monthly['n_rented']\n\
    gcc_monthly['avg_sale_price'] = gcc_monthly['total_sale_value'] / gcc_monthly['n_sold']\ngcc_monthly['yield_pct']\
    \ = 52.0 * gcc_monthly['avg_weekly_rent'] / gcc_monthly['avg_sale_price'] * 100.0\n\n# Latest month\n\
    latest_month = gcc_monthly['month'].max()\nprint(f\"Data range: {gcc_monthly['month'].min()} to {latest_month}\"\
    )\n\n# Latest values\ngcc_latest = gcc_monthly[gcc_monthly['month'] == latest_month].copy()\ngreater_syd_latest\
    \ = gcc_latest[gcc_latest['gcc_name'] == 'Greater Sydney']['yield_pct'].values[0]\nrest_nsw_latest\
    \ = gcc_latest[gcc_latest['gcc_name'] == 'Rest of NSW']['yield_pct'].values[0]\n\n# Growth: compare\
    \ latest vs same month 3 years earlier\n\nref_month = (datetime.datetime.strptime(latest_month, '%Y-%m-%d')\
    \ - relativedelta(years=3)).strftime('%Y-%m-%d')\n\ngcc_ref = gcc_monthly[gcc_monthly['month'] ==\
    \ ref_month]\nif len(gcc_ref) > 0:\n    gs_ref = gcc_ref[gcc_ref['gcc_name'] == 'Greater Sydney']['yield_pct'].values[0]\n\
    \    rn_ref = gcc_ref[gcc_ref['gcc_name'] == 'Rest of NSW']['yield_pct'].values[0]\n    gs_growth\
    \ = (greater_syd_latest - gs_ref) / gs_ref * 100\n    rn_growth = (rest_nsw_latest - rn_ref) / rn_ref\
    \ * 100\nelse:\n    gs_growth = None\n    rn_growth = None\n\nprint(f\"Greater Sydney yield: {greater_syd_latest:.2f}%\
    \ (vs {gs_ref:.2f}% 3yr ago)\")\nprint(f\"Rest of NSW yield: {rest_nsw_latest:.2f}% (vs {rn_ref:.2f}%\
    \ 3yr ago)\")\nprint(f\"Growth: GS={gs_growth:.1f}%, RoNSW={rn_growth:.1f}%\")\n\n# --- Trend series\
    \ ---\ns = skills.trend_series(gcc_monthly, month_col='month', value_col='yield_pct', group_col='gcc_name')\n\
    \nresult = skills.build_report(\n    summary=\"**Greater Sydney vs Rest of NSW: Gross Rental Yield**\
    \ — comparing the annualised gross rental yield (52× weekly rent ÷ sale price) across the two Greater\
    \ Capital City regions. Data is aggregated from postcode-level yield marts up to GCC Statistical Areas,\
    \ covering all property types (houses + units) from 2016 to present.\",\n    headlines=[\n       \
    \ {\"label\": \"Greater Sydney Yield\", \"value\": f\"{greater_syd_latest:.2f}%\", \"basis\": latest_month},\n\
    \        {\"label\": \"Rest of NSW Yield\", \"value\": f\"{rest_nsw_latest:.2f}%\", \"basis\": latest_month},\n\
    \        {\"label\": \"Greater Sydney 3yr Change\", \"value\": f\"{gs_growth:+.1f}%\" if gs_growth\
    \ is not None else \"N/A\", \"basis\": f\"{ref_month} → {latest_month}\"},\n        {\"label\": \"\
    Rest of NSW 3yr Change\", \"value\": f\"{rn_growth:+.1f}%\" if rn_growth is not None else \"N/A\"\
    , \"basis\": f\"{ref_month} → {latest_month}\"},\n    ],\n    main_chart=skills.trend_chart(s, title=\"\
    Gross Rental Yield — Greater Sydney vs Rest of NSW\"),\n)"
