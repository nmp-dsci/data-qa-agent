        - data:
            text: '**Safe high-yield areas** in Greater Sydney, filtered for market depth (≥30 sales &
              ≥30 rentals in latest 6 months). Overall house yield: **2.6%**; unit yield: **3.8%**. Top
              safe house suburb: **Austral** (3.7% yield, 383 sales). Top unit suburb: **Fairfield** (5.4%
              yield).'
          role: note
          type: text
          element_id: report:summary
      - - data:
            sql: "WITH\ndominant_suburb AS (\n    SELECT DISTINCT ON (postcode) postcode, suburb\n   \
              \ FROM staging.int_postcode_geo\n    ORDER BY postcode, n_sales DESC\n),\nrecent_yield AS\
              \ (\n    SELECT\n        y.postcode,\n        y.property_type,\n        SUM(y.total_sale_value)\
              \ AS total_sale_value,\n        SUM(y.n_sold) AS n_sold,\n        SUM(y.total_weekly_rent)\
              \ AS total_weekly_rent,\n        SUM(y.n_rented) AS n_rented\n    FROM marts.property_yield\
              \ y\n    WHERE y.month >= (SELECT MAX(month) - INTERVAL '6 months' FROM marts.property_yield)\n\
              \    GROUP BY y.postcode, y.property_type\n)\nSELECT\n    ry.postcode,\n    ds.suburb,\n\
              \    ry.property_type,\n    ry.total_sale_value,\n    ry.n_sold,\n    ry.total_weekly_rent,\n\
              \    ry.n_rented,\n    (ry.total_sale_value / NULLIF(ry.n_sold, 0)) AS avg_sale_price,\n\
              \    (ry.total_weekly_rent / NULLIF(ry.n_rented, 0)) AS avg_weekly_rent,\n    52.0 * (ry.total_weekly_rent\
              \ / NULLIF(ry.n_rented, 0)) / NULLIF((ry.total_sale_value / NULLIF(ry.n_sold, 0)), 0) *\
              \ 100 AS gross_yield_pct,\n    COALESCE(dg.sa3_name, 'Unknown') AS sa3_name,\n    COALESCE(dg.sa4_name,\
              \ 'Unknown') AS sa4_name,\n    COALESCE(dg.gcc_name, 'Unknown') AS gcc_name\nFROM recent_yield\
              \ ry\nLEFT JOIN dominant_suburb ds ON ry.postcode = ds.postcode\nLEFT JOIN marts.dim_postcode_geo\
              \ dg ON ry.postcode = dg.postcode\nWHERE ry.n_sold >= 10 AND ry.n_rented >= 10\nORDER BY\
              \ gross_yield_pct DESC"
