- case_key: nsw_yield-units-vs-houses-which-yields-more-and-how-has-th-0a7a
  question: 'Units vs houses: which yields more, and how has the spread moved?'
  dataset: nsw_yield
  tier: T2
  as_user: user1
  holdout: false
  origin_env: dev
  authoring_status: draft
  expectation: Two statewide gross_yield_pct series (unit vs house) and the moving spread between them.
  tags:
  - coverage-pack
  - coverage:Y4
  - direction:comparison
  grader: {}
  golden_sql: "SELECT month, property_type,\n       SUM(total_sale_value) / NULLIF(SUM(n_sold), 0) AS\
    \ avg_sale_price,\n       SUM(total_weekly_rent) / NULLIF(SUM(n_rented), 0) AS avg_weekly_rent,\n\
    \       52.0 * (SUM(total_weekly_rent) / NULLIF(SUM(n_rented), 0)) / (SUM(total_sale_value) / NULLIF(SUM(n_sold),\
    \ 0)) * 100 AS gross_yield_pct,\n       SUM(n_sold) AS n_sold,\n       SUM(n_rented) AS n_rented\n\
    FROM marts.property_yield\nWHERE property_type IN ('house', 'unit')\n  AND month >= '2015-01-01'\n\
    GROUP BY month, property_type\nORDER BY month, property_type"
  golden_sandbox: "# PASS 1 — Summary page\n\n# Prepare the data: compute monthly yield spread (unit -\
    \ house)\nhouses = df[df['property_type'] == 'house'][['month', 'gross_yield_pct', 'avg_sale_price',\
    \ 'avg_weekly_rent']].copy()\nhouses.columns = ['month', 'house_yield', 'house_price', 'house_rent']\n\
    units = df[df['property_type'] == 'unit'][['month', 'gross_yield_pct', 'avg_sale_price', 'avg_weekly_rent']].copy()\n\
    units.columns = ['month', 'unit_yield', 'unit_price', 'unit_rent']\n\nmerged = houses.merge(units,\
    \ on='month')\nmerged['spread'] = merged['unit_yield'] - merged['house_yield']\n\n# Latest values\n\
    latest = merged.sort_values('month').iloc[-1]\nearliest = merged.sort_values('month').iloc[0]\n\n\
    # Trend series for yield comparison\nyield_long = df[['month', 'property_type', 'gross_yield_pct']].copy()\n\
    yield_long = yield_long.rename(columns={'gross_yield_pct': 'value', 'property_type': 'series'})\n\n\
    # Spread trend data\nspread_df = merged[['month', 'spread']].copy()\nspread_df.columns = ['month',\
    \ 'value']\nspread_df['series'] = 'spread'\n\n# Yield series using trend_series skill\nyield_series\
    \ = skills.trend_series(df, month_col='month', value_col='gross_yield_pct', group_col='property_type')\n\
    spread_series = skills.trend_series(merged, month_col='month', value_col='spread')\n\n# Latest value\
    \ of each\nlatest_house = skills.latest_value(df[df['property_type']=='house'], month_col='month',\
    \ value_col='gross_yield_pct')\nlatest_unit = skills.latest_value(df[df['property_type']=='unit'],\
    \ month_col='month', value_col='gross_yield_pct')\n\n# Spread at latest\nspread_latest = merged.sort_values('month').iloc[-1]\n\
    spread_earliest = merged.sort_values('month').iloc[0]\n\n# Growth rates over ~9 years (earliest ~2016-01\
    \ to latest ~2025)\nhouse_growth = skills.growth_rate(df[df['property_type']=='house'], month_col='month',\
    \ value_col='gross_yield_pct', years=9)\nunit_growth = skills.growth_rate(df[df['property_type']=='unit'],\
    \ month_col='month', value_col='gross_yield_pct', years=9)\n\n# Yield spread growth\nspread_growth_val\
    \ = (spread_latest['spread'] - spread_earliest['spread']) / spread_earliest['spread'] * 100 if spread_earliest['spread']\
    \ != 0 else 0\n\n# Build the dual-axis chart: left=avg_sale_price, right=gross_yield_pct\nprice_yield\
    \ = df[df['property_type'] == 'house'][['month', 'avg_sale_price', 'gross_yield_pct']].copy()\nprice_yield.columns\
    \ = ['month', 'house_price', 'house_yield']\npu = df[df['property_type'] == 'unit'][['month', 'avg_sale_price',\
    \ 'gross_yield_pct']].copy()\npu.columns = ['month', 'unit_price', 'unit_yield']\nprice_yield = price_yield.merge(pu,\
    \ on='month')\n\n# Better approach: main chart is the yield comparison over time (dual axis with spread\
    \ overlay isn't needed)\n# Use the trend series for both types\n\n# Main chart: dual axis with unit\
    \ yield and house yield as two lines on a trend chart\n# Actually, trend_chart can handle group_col\n\
    yield_trend = skills.trend_chart(yield_series, title=\"Gross Rental Yield: Houses vs Units (NSW)\"\
    )\n\n# Headlines\nh_latest_house_val = latest_house['value']\nh_latest_house_mon = latest_house['month']\n\
    h_latest_unit_val = latest_unit['value']\nh_latest_unit_mon = latest_unit['month']\n\nresult = skills.build_report(\n\
    \    summary=f\"**Units yield more than houses** — the gap has been narrowing over the past decade.\
    \ \"\n            f\"As of the latest data ({h_latest_unit_mon}), unit gross rental yield sits at\
    \ \"\n            f\"{h_latest_unit_val:.2f}%, while house yield is {h_latest_house_val:.2f}%, \"\n\
    \            f\"a spread of {spread_latest['spread']:.2f} percentage points. \"\n            f\"Since\
    \ early 2016, house yield has {house_growth:.1f}% and unit yield has {unit_growth:.1f}%, \"\n    \
    \        f\"with the spread narrowing from {spread_earliest['spread']:.2f}pp to {spread_latest['spread']:.2f}pp.\"\
    ,\n    headlines=[\n        {\"label\": \"House Gross Yield\", \"value\": f\"{h_latest_house_val:.2f}%\"\
    , \"basis\": f\"6-month avg to {h_latest_house_mon}\"},\n        {\"label\": \"Unit Gross Yield\"\
    , \"value\": f\"{h_latest_unit_val:.2f}%\", \"basis\": f\"6-month avg to {h_latest_unit_mon}\"},\n\
    \        {\"label\": \"Yield Spread (Unit - House)\", \"value\": f\"{spread_latest['spread']:.2f}pp\"\
    , \"basis\": \"latest\"},\n        {\"label\": \"House Yield Trend (9yr)\", \"value\": f\"{house_growth:.1f}%\"\
    \ if house_growth else \"N/A\", \"basis\": \"change since early 2016\"},\n    ],\n    main_chart=yield_trend,\n\
    )"
