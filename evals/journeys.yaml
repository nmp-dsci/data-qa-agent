# User-journey evals — login -> ask -> agent answers, plus RLS isolation.
# Introduced in Phase 1 (auth); this suite grows every phase. Add a journey to
# add coverage. Runs via `tests/test_journeys.py` against a running stack
# (`make up`); it skips automatically when the stack is not reachable.
#
# Each journey signs in (dev-auth stub) as `as_user` — or is `anonymous` — then
# asserts every item under `expect`. Supported expectations:
#   login_succeeds            dev-login returns a token + user
#   login_rejected            dev-login is refused (unknown user)
#   me_role: <role>           GET /me returns this role
#   unauthenticated_rejected  GET /me without a token returns 401
#   agent_answers_successfully  /ask returns a non-empty answer with rows
#   sql_is_select_only        the generated SQL is a single SELECT
#   mentions: [a, b]          each term appears in the answer or a column name
#   no_rows_or_access_denied  /ask returns zero rows (RLS isolation)
#   chart_present              /ask returned a chart spec
#   chart_mark: line           the chart's Vega-Lite mark is this type
#   chart_encoding_channels: [x, y, color]   all listed encoding channels are present
#                              (color present = multiple series, e.g. sale price + rent)
#   decision_log_present       persisted trace includes an ordered Decision Log
#   mart_used: marts.table     Decision Log includes a selected table/mart
#   skill_used: trend_chart    Decision Log includes a selected analysis/chart skill
#   chart_used: trend_chart    Decision Log includes a selected chart skill

journeys:
  - name: admin signs in and is recognised as admin
    as_user: admin
    expect:
      - login_succeeds
      - me_role: admin

  - name: user1 signs in as a regular user
    as_user: user1
    expect:
      - login_succeeds
      - me_role: user

  - name: user1 sees top growth suburbs for sales and rent
    as_user: user1
    question: What are the top growth suburbs for sale price and rent?
    expect:
      - agent_answers_successfully
      - sql_is_select_only
      - mentions: [suburb]

  - name: user2 is isolated from the property data (RLS)
    as_user: user2
    question: What are the top growth suburbs for sale price and rent?
    expect:
      - no_rows_or_access_denied

  - name: user1 sees rental yield (combines both datasets)
    as_user: user1
    question: What are the best suburbs for rental yield?
    expect:
      - agent_answers_successfully
      - sql_is_select_only
      - mentions: [suburb]

  - name: user2 is isolated from rental yield (needs both grants)
    as_user: user2
    question: What are the best suburbs for rental yield?
    expect:
      - no_rows_or_access_denied

  - name: user1 sees a time-series chart comparing sale price and rent trends
    # Key acceptance test for the data pipeline refactor (marts redesigned as
    # summary building blocks, no precomputed growth%): the agent must compute
    # a month-by-month average itself (total_sale_value/n_sold,
    # total_weekly_rent/n_rented) and combine both series into one chart —
    # proving the richer, agent-computed grain actually reaches the UI, not
    # just the SQL layer.
    as_user: user1
    question: >
      Show me a chart of the average sale price and average rent over time,
      month by month.
    expect:
      - agent_answers_successfully
      - sql_is_select_only
      - chart_present
      - chart_mark: line
      - chart_encoding_channels: [x, y, color]

  - name: admin trajectory records mart skill and chart choices
    as_user: admin
    question: give me trend of average sale price by month for hornsby by property type
    expect:
      - agent_answers_successfully
      - decision_log_present
      - mart_used: marts.property_sales
      - skill_used: trend_chart
      - chart_used: trend_chart

  - name: unknown user cannot sign in
    as_user: nobody
    expect:
      - login_rejected

  - name: unauthenticated requests are rejected
    anonymous: true
    expect:
      - unauthenticated_rejected
