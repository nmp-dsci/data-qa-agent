<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Data Pilot</title>
    <meta name="description" content="Data Pilot — your data, flown right. Ask in plain English; get governed answers in seconds." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0d15" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f4ee" />
    <!-- Resolve the theme before first paint (stored override, else system) so
         there is no flash of the wrong background while the bundle loads. The
         theme-color metas above only track the system scheme, so point them at
         the resolved theme too (a manual override must recolor the chrome). -->
    <script>
      try {
        var t = localStorage.getItem("app.theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
        var c = t === "light" ? "#f6f4ee" : "#0a0d15";
        document.querySelectorAll('meta[name="theme-color"]').forEach(function (m) {
          m.setAttribute("content", c);
        });
      } catch (e) {}
    </script>
    <style>
      html { background: #0a0d15; }
      html[data-theme="light"] { background: #f6f4ee; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
