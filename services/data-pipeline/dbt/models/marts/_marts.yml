version: 2

models:
  - name: mart_property_sales
    description: >
      Aggregate mart for cleaned NSW residential sales. Physical table:
      marts.property_sales, matching raw.property_sales and
      staging.property_sales for easy lineage. One row per (postcode, suburb,
      property_type, area_band, zoning, month). Holds cleaned attributes plus
      additive aggregate metrics so consumers can re-aggregate to higher levels
      and compute derived metrics such as growth or yield in SQL. No precomputed
      ALL rows, growth percentages, or joined rent metrics. Belongs to the
      `nsw_sales` dataset (RLS-scoped). Verified by
      assert_property_sales_has_coverage and
      assert_property_sales_unique_postcode_suburb_type_band_zoning_month.
    columns:
      - name: postcode
        description: Postcode. Join key to marts.property_rent with property_type and month when deriving yield.
        data_tests: [not_null]
      - name: suburb
        description: Suburb/locality from the sale records. Part of the sales mart grain.
        data_tests: [not_null]
      - name: property_type
        description: "'house' or 'unit'. No synthetic 'ALL' rows; re-aggregate across property_type when needed."
        data_tests: [not_null]
      - name: area_band
        description: "Standardised lot-size band: '<400','400-700','700-1000','1000-5000','5000+', or 'unknown'. Part of the grain."
        data_tests: [not_null]
      - name: zoning
        description: NSW planning zone code, or 'unknown'. Part of the grain.
        data_tests: [not_null]
      - name: month
        description: Calendar month (first-of-month date) the sales occurred in.
        data_tests: [not_null]
      - name: total_sale_value
        description: Additive sum of sale_price (AUD) in the bucket. Use with n_sold for re-aggregated averages and growth.
        data_tests: [not_null]
      - name: n_sold
        description: Additive count of sales in the bucket.
        data_tests: [not_null]
      - name: avg_sale_price
        description: Bucket-level average sale price. For re-aggregated means, recompute from sum(total_sale_value) / sum(n_sold).
      - name: median_sale_price
        description: Bucket-level median sale price. Useful for the current bucket, but not additive across buckets.
      - name: min_sale_price
        description: Minimum sale price in the bucket.
      - name: max_sale_price
        description: Maximum sale price in the bucket.

  - name: mart_property_rent
    description: >
      Aggregate mart for cleaned NSW rental bond lodgements. Physical table:
      marts.property_rent, matching raw.property_rent and staging.property_rent
      for easy lineage. One row per (postcode, property_type, bedroom_band,
      month). Rent source data has no suburb, so the honest aggregate grain is
      postcode-level. Holds cleaned attributes plus additive aggregate metrics
      so consumers can re-aggregate to higher levels and compute derived metrics
      such as rent growth or joined yield in SQL. No precomputed ALL rows or
      growth percentages. Belongs to the `nsw_rent` dataset (RLS-scoped).
      Verified by assert_property_rent_has_coverage and
      assert_property_rent_unique_postcode_type_bedroom_month.
    columns:
      - name: postcode
        description: Postcode. Join key to marts.property_sales with property_type and month when deriving yield.
        data_tests: [not_null]
      - name: property_type
        description: "'house' or 'unit'. No synthetic 'ALL' rows; re-aggregate across property_type when needed."
        data_tests: [not_null]
      - name: bedroom_band
        description: "'0','1','2','3','4','5+', or 'unknown'. Part of the grain."
        data_tests: [not_null]
      - name: month
        description: Calendar month (first-of-month date) the bonds were lodged in.
        data_tests: [not_null]
      - name: total_weekly_rent
        description: Additive sum of weekly_rent (AUD) in the bucket. Use with n_rented for re-aggregated averages and growth.
        data_tests: [not_null]
      - name: n_rented
        description: Additive count of bonds in the bucket.
        data_tests: [not_null]
      - name: avg_weekly_rent
        description: Bucket-level average weekly rent. For re-aggregated means, recompute from sum(total_weekly_rent) / sum(n_rented).
      - name: median_weekly_rent
        description: Bucket-level median weekly rent. Useful for the current bucket, but not additive across buckets.
      - name: min_weekly_rent
        description: Minimum weekly rent in the bucket.
      - name: max_weekly_rent
        description: Maximum weekly rent in the bucket.
