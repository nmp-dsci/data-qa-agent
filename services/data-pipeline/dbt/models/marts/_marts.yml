version: 2

models:
  - name: mart_sales_growth
    description: >
      Residential sale-price growth by NSW postcode + property_type. One row per
      (postcode, property_type); property_type is 'house', 'unit', or 'ALL'
      (blended across both). Belongs to the `nsw_sales` dataset (RLS-scoped).
      Join to mart_rent_growth or mart_property_yield on (postcode, property_type)
      to compare sales, rent, and yield together — suburb is a label, not the
      join key (postcode<->suburb is not 1:1 in this data).
      Answers questions like: "which suburbs/postcodes had the fastest house
      price growth", "how much did unit prices rise in <suburb>", "rank
      postcodes by sale price growth". Verified by
      assert_sales_growth_has_coverage (enough postcodes to rank) and
      assert_growth_pct_not_below_negative_100 (growth figures are sane).
    columns:
      - name: postcode
        description: Postcode. Join key across the property marts.
        data_tests: [not_null]
      - name: suburb
        description: Dominant suburb name for the postcode (most sales) — a label only.
      - name: property_type
        description: "'house', 'unit', or 'ALL' (blended across both)."
        data_tests: [not_null]
      - name: first_year
        description: First year in the window with enough sales to measure.
      - name: last_year
        description: Last year in the window with enough sales to measure.
      - name: first_median_price
        description: Median sale price (AUD) in first_year.
      - name: last_median_price
        description: Median sale price (AUD) in last_year.
      - name: sales_growth_pct
        description: Percent change in median sale price from first_year to last_year.
        data_tests: [not_null]
      - name: n_sales
        description: Number of sales contributing across the window.

  - name: mart_rent_growth
    description: >
      Weekly-rent growth by NSW postcode + property_type. One row per (postcode,
      property_type); property_type is 'house', 'unit', or 'ALL' (blended).
      Belongs to the `nsw_rent` dataset (RLS-scoped). Join to mart_sales_growth
      or mart_property_yield on (postcode, property_type).
      Answers questions like: "which suburbs/postcodes saw the biggest rent
      increases", "how has weekly rent changed for units vs houses in
      <suburb>". Verified by assert_rent_growth_has_coverage (enough postcodes
      to rank) and assert_growth_pct_not_below_negative_100 (growth figures
      are sane).
    columns:
      - name: postcode
        description: Postcode. Join key across the property marts.
        data_tests: [not_null]
      - name: suburb
        description: Dominant suburb name for the postcode (most sales) — a label only.
      - name: property_type
        description: "'house', 'unit', or 'ALL' (blended across both)."
        data_tests: [not_null]
      - name: first_year
        description: First year in the window with enough bonds to measure.
      - name: last_year
        description: Last year in the window with enough bonds to measure.
      - name: first_median_rent
        description: Median weekly rent (AUD) in first_year.
      - name: last_median_rent
        description: Median weekly rent (AUD) in last_year.
      - name: rent_growth_pct
        description: Percent change in median weekly rent from first_year to last_year.
        data_tests: [not_null]
      - name: n_bonds
        description: Number of rental bonds contributing across the window.

  - name: mart_property_yield
    description: >
      Gross rental yield by NSW postcode + property_type + year: (median weekly
      rent * 52) / median sale price, as a percentage. One row per (postcode,
      property_type, year); property_type is 'house', 'unit', or 'ALL' (blended).
      Spans both datasets — requires nsw_sales AND nsw_rent access (RLS). Filter
      to the latest year for "current" yield, or compare years for a trend.
      Answers questions like: "which suburbs/postcodes have the best rental
      yield", "what's the yield trend for <postcode> over time", "compare
      yield between houses and units". Verified by assert_yield_has_coverage
      (enough postcodes to rank) and assert_yield_pct_in_sane_range (yield
      figures are sane).
    columns:
      - name: postcode
        description: Postcode. Join key across the property marts.
        data_tests: [not_null]
      - name: suburb
        description: Dominant suburb name for the postcode (most sales) — a label only.
      - name: property_type
        description: "'house', 'unit', or 'ALL' (blended across both)."
        data_tests: [not_null]
      - name: year
        description: Calendar year the price/rent/yield were measured in.
        data_tests: [not_null]
      - name: median_price
        description: Median sale price (AUD) that year.
      - name: median_rent
        description: Median weekly rent (AUD) that year.
      - name: gross_yield_pct
        description: Gross rental yield percentage = (median_rent * 52 / median_price) * 100.
        data_tests: [not_null]
      - name: n_sales
        description: Number of sales contributing to median_price that year.
      - name: n_bonds
        description: Number of rental bonds contributing to median_rent that year.
